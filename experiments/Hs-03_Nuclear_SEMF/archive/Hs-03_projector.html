<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hs-03 — Nuclear SEMF Manifold Projector</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030406;color:#6898b8;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;position:absolute;top:0;left:0}
.hud{position:absolute;pointer-events:none;user-select:none}
.hud-tl{top:16px;left:20px}
.hud-tl h1{font-size:18px;color:#6898b8;font-weight:400;letter-spacing:2px}
.hud-tl h1 b{color:#8ab8d8}
.hud-tl .sub{font-size:10px;color:#405868;letter-spacing:3px;margin-top:2px}
.hud-tl .title-line{font-size:11px;color:#506878;letter-spacing:1px;margin-top:4px}
.hud-tr{top:12px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:auto}
.ctrl-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.btn{background:#101820;border:1px solid #253038;color:#6898b8;font-family:'Courier New',monospace;font-size:10px;padding:3px 8px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.btn:hover{border-color:#6898b8;color:#8ab8d8}
.btn.active{background:#1a2830;border-color:#6898b8;color:#8ab8d8}
.btn.system{padding:3px 10px}
.btn.system.active{border-color:var(--cc);color:var(--cc);background:#101820}
.hud-bl{bottom:28px;left:20px;right:20px;pointer-events:auto}
.time-row{display:flex;align-items:center;gap:8px}
.time-row label{font-size:10px;color:#405868;min-width:36px}
.time-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:#1a2830;outline:none;border-radius:2px;cursor:pointer}
.time-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#6898b8;border-radius:50%;cursor:pointer}
.time-val{font-size:11px;color:#6898b8;min-width:48px;text-align:right}
.readout{margin-top:6px;font-size:9px;color:#405868;letter-spacing:1px;display:flex;gap:16px;flex-wrap:wrap}
.readout span{white-space:nowrap}
.readout .val{color:#6898b8}
.hud-left{top:50%;left:12px;transform:translateY(-50%);pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:4px}

.hud-br{bottom:70px;right:16px;font-size:9px;color:#405868;pointer-events:none}
.hud-br .leg-title{color:#506878;margin-bottom:4px;letter-spacing:1px}
.hud-br .leg-item{display:flex;align-items:center;gap:6px;margin:2px 0}
.leg-dot{width:8px;height:3px;border-radius:1px}
#dataLegend{position:absolute;bottom:70px;left:20px;font-size:9px;color:#405868;pointer-events:none;max-width:240px}
#dataLegend .dl-title{color:#6898b8;font-size:11px;letter-spacing:1px;margin-bottom:6px}

<body>
<canvas id="cv"></canvas>

<div class="hud hud-tl" id="hudTL">
  <h1>H<b>&sup2;</b> Manifold Projector</h1>
  <div class="sub">COMPOSITIONAL DATA MANIFOLD IN SPACE AND TIME</div>
  <div class="title-line" id="expTitle"></div>
</div>

<div class="hud hud-tr" id="controls">
  <div class="ctrl-row" id="systemBtns"></div>
  <div class="ctrl-row">
    <button class="btn active" id="btnOrbit" onclick="toggleOrbit()">ORBIT</button>
    <button class="btn" id="btnTrails" onclick="toggle('trails')">TRAILS</button>
    <button class="btn" id="btnPerturb" onclick="toggle('perturb')">PERTURBATIONS</button>
    <button class="btn" id="btnColor" onclick="toggle('colorMode')">COLOR</button>
    <button class="btn" id="btnGhost" onclick="toggle('ghost')">GHOST</button>
    <button class="btn" id="btnLabels" onclick="toggle('labels')">LABELS</button>
  </div>
  <div class="ctrl-row">
    <button class="btn" onclick="setView('front')">FRONT</button>
    <button class="btn" onclick="setView('side')">SIDE</button>
    <button class="btn" onclick="setView('top')">TOP</button>
    <button class="btn" onclick="setView('iso')">ISO</button>
  </div>
</div>

<div class="hud hud-left" id="hudLeft">
  <div class="zoom-label">ZOOM</div>
  <input type="range" class="zoom-slider" id="zoomSlider" min="30" max="300" value="100" orient="vertical" oninput="zoom=+this.value/100">
  <div class="zoom-label">DEPTH</div>
</div>

<div class="hud hud-bl" id="hudBL">
  <div class="time-row">
    <label>TIME</label>
    <input type="range" class="time-slider" id="timeSlider" min="0" max="1" value="1" oninput="setTime(+this.value)">
    <span class="time-val" id="timeVal">ALL</span>
  </div>
  <div class="readout" id="readout"></div>
</div>

<div id="dataLegend"></div>

<div class="hud hud-br" id="pertLegend" style="display:none">
  <div class="leg-title">PERTURBATION MAGNITUDE</div>
  <div class="leg-item"><div class="leg-dot" style="background:#32cd32"></div> small |dCLR| &lt; 0.5</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ffd700"></div> medium 0.5-1.5</div>
  <div class="leg-item"><div class="leg-dot" style="background:#ff4500"></div> large |dCLR| &gt; 1.5</div>

<script>
// ============================================================
//  Hs-03 NUCLEAR SEMF MANIFOLD PROJECTOR
//  SEMF binding energy Z=1-92, D=3 carriers
//  (Volume, Surface+Coulomb, Symmetry+Pairing)
//  Canonical Hˢ projector engine: FOV=700, sc=FOV/(FOV+z+350)
// ============================================================

const PALETTE = [
  '#ffd700','#ff6b6b','#ff69b4','#4169e1','#ff4500','#32cd32',
  '#ffffff','#00ced1','#ff8c00','#9370db','#20b2aa','#dc143c'
];
const CARRIER_PALETTE = [
  '#5db87a','#8a9baa','#d4944a','#4a8ad4','#9a6ab8','#8a7a6a',
  '#7ab85a','#d4b44a','#4ab8d4','#b85a5a','#5a8ab8','#b8a45a'
];
const KNOWN_CARRIER_COLORS = {
  'Volume':'#4a8ad4','Surf+Coulomb':'#d4944a','Sym+Pairing':'#9a6ab8'
};
function carrierColor(name, idx) {
  return KNOWN_CARRIER_COLORS[name] || CARRIER_PALETTE[idx % CARRIER_PALETTE.length];
}

let DATA = {};
let systemOrder = [];
let currentSystem = null;
let expTitle = '';

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H, dpr;
let rotX = -0.35, rotY = 0.4;
let zoom = 1.0;
let orbit = true, trails = false, perturb = false, colorMode = false, ghost = false, labels = false;
let timeIdx = -1;
let maxT = 0;
let lockYear = -1;
let mouseDown = false, lastMX = 0, lastMY = 0;
let orbitAngle = 0;
let mouseX = -1, mouseY = -1;
let animating = false;

// ============ EMBEDDED SEMF DATA ============
const EMBEDDED_DATA = {"projector": true, "title": "Hs-03 \u2014 Nuclear SEMF Binding Energy", "subtitle": "NUCLEAR \u00b7 Z=1-92 \u00b7 D=3", "generator": "semf_projector.py", "systems": {"SEMF": {"name": "SEMF Binding Energy (Z=1-92)", "color": "#ffd700", "carriers": ["Volume", "Surf+Coulomb", "Sym+Pairing"], "labels": ["Z=1", "Z=2", "Z=3", "Z=4", "Z=5", "Z=6", "Z=7", "Z=8", "Z=9", "Z=10", "Z=11", "Z=12", "Z=13", "Z=14", "Z=15", "Z=16", "Z=17", "Z=18", "Z=19", "Z=20", "Z=21", "Z=22", "Z=23", "Z=24", "Z=25", "Z=26", "Z=27", "Z=28", "Z=29", "Z=30", "Z=31", "Z=32", "Z=33", "Z=34", "Z=35", "Z=36", "Z=37", "Z=38", "Z=39", "Z=40", "Z=41", "Z=42", "Z=43", "Z=44", "Z=45", "Z=46", "Z=47", "Z=48", "Z=49", "Z=50", "Z=51", "Z=52", "Z=53", "Z=54", "Z=55", "Z=56", "Z=57", "Z=58", "Z=59", "Z=60", "Z=61", "Z=62", "Z=63", "Z=64", "Z=65", "Z=66", "Z=67", "Z=68", "Z=69", "Z=70", "Z=71", "Z=72", "Z=73", "Z=74", "Z=75", "Z=76", "Z=77", "Z=78", "Z=79", "Z=80", "Z=81", "Z=82", "Z=83", "Z=84", "Z=85", "Z=86", "Z=87", "Z=88", "Z=89", "Z=90", "Z=91", "Z=92"], "clr": [[0.476206, 0.347106, -0.823312], [0.893093, 0.553053, -1.446146], [1.134306, 0.678824, -1.81313], [1.303667, 0.771624, -2.075292], [1.433711, 0.846252, -2.279963], [1.661651, 1.069382, -2.731033], [1.7855, 1.155793, -2.941293], [1.890838, 1.231319, -3.122157], [1.982336, 1.298649, -3.280985], [2.0631, 1.359573, -3.422672], [1.480672, 0.785715, -2.266387], [1.543418, 0.833159, -2.376576], [1.600156, 0.877094, -2.47725], [1.651872, 0.918071, -2.569943], [1.57114, 0.849063, -2.420203], [1.621633, 0.890996, -2.512628], [1.668491, 0.930661, -2.599153], [1.712178, 0.968329, -2.680507], [1.478594, 0.747726, -2.22632], [1.516784, 0.781088, -2.297872], [1.552682, 0.812998, -2.365681], [1.47716, 0.750822, -2.227982], [1.511559, 0.782044, -2.293603], [1.544161, 0.812096, -2.356257], [1.403218, 0.684603, -2.087821], [1.432864, 0.712267, -2.145131], [1.461104, 0.739004, -2.200109], [1.399139, 0.690437, -2.089576], [1.426175, 0.716375, -2.14255], [1.326854, 0.630347, -1.957201], [1.35192, 0.65465, -2.00657], [1.375967, 0.678267, -2.054234], [1.324382, 0.639784, -1.964166], [1.347435, 0.66265, -2.010085], [1.27104, 0.599191, -1.870231], [1.292682, 0.620851, -1.913533], [1.248816, 0.589741, -1.838557], [1.269588, 0.610702, -1.88029], [1.289655, 0.631178, -1.920833], [1.227665, 0.581681, -1.809346], [1.246673, 0.601223, -1.847895], [1.208503, 0.57535, -1.783852], [1.226809, 0.594296, -1.821105], [1.174985, 0.554572, -1.729558], [1.192422, 0.572739, -1.765161], [1.158729, 0.550947, -1.709676], [1.175555, 0.568579, -1.744134], [1.131066, 0.535793, -1.666859], [1.147164, 0.552763, -1.699926], [1.117014, 0.534121, -1.651135], [1.132579, 0.550612, -1.683191], [1.093618, 0.522966, -1.616584], [1.066429, 0.506975, -1.573404], [1.081281, 0.522727, -1.604008], [1.046815, 0.49927, -1.546085], [1.06111, 0.514506, -1.575615], [1.036275, 0.500497, -1.536773], [1.050135, 0.515333, -1.565468], [1.019095, 0.494937, -1.514032], [1.03247, 0.509318, -1.541788], [1.00961, 0.496926, -1.506536], [0.981513, 0.479193, -1.460706], [0.994364, 0.493008, -1.487372], [0.973255, 0.482091, -1.455346], [0.985746, 0.49557, -1.481317], [0.95997, 0.479821, -1.439791], [0.940367, 0.470145, -1.410511], [0.952398, 0.483121, -1.435519], [0.928695, 0.469186, -1.397881], [0.940365, 0.48182, -1.422185], [0.922003, 0.473072, -1.395075], [0.900071, 0.460659, -1.36073], [0.911341, 0.47285, -1.384191], [0.894129, 0.46501, -1.359139], [0.873726, 0.453887, -1.327613], [0.884622, 0.465665, -1.350286], [0.868426, 0.458608, -1.327034], [0.849357, 0.44859, -1.297946], [0.859902, 0.45998, -1.319882], [0.844611, 0.453604, -1.298215], [0.826714, 0.444539, -1.271252], [0.836932, 0.455565, -1.292496], [0.82245, 0.449784, -1.272234], [0.805591, 0.441547, -1.247138], [0.815501, 0.452231, -1.267732], [0.801748, 0.446974, -1.248722], [0.785816, 0.439461, -1.225277], [0.795436, 0.449824, -1.24526], [0.782342, 0.445029, -1.22737], [0.767241, 0.438154, -1.205395], [0.776588, 0.448212, -1.224801], [0.764093, 0.443828, -1.207921]]}}};

// ============ DATA PARSING ============
function loadEmbedded() {
  const j = EMBEDDED_DATA;
  DATA = {};
  systemOrder = [];
  expTitle = j.title || '';
  const subtitle = j.subtitle || '';
  if (subtitle) expTitle += (expTitle ? ' — ' : '') + subtitle;
  let ci = 0;
  for (const [key, sys] of Object.entries(j.systems)) {
    DATA[key] = {
      code: key,
      name: sys.name || key,
      color: sys.color || PALETTE[ci % PALETTE.length],
      carriers: sys.carriers,
      labels: sys.labels || sys.carriers.map((_, i) => String(i)),
      clr: sys.clr
    };
    systemOrder.push(key);
    ci++;
  }
  for (const d of Object.values(DATA)) normalizeSystem(d);
  currentSystem = systemOrder[0];
  maxT = Math.max(...Object.values(DATA).map(d => d.clr.length));
  timeIdx = maxT;
  initUI();
}

// ============ NORMALIZATION ============
function normalizeSystem(d) {
  const D = d.carriers.length;
  const T = d.clr.length;
  if (T === 0) return;
  const mins = new Array(D).fill(Infinity);
  const maxs = new Array(D).fill(-Infinity);
  for (let t = 0; t < T; t++) {
    for (let j = 0; j < D; j++) {
      const v = d.clr[t][j];
      if (v < -10) continue;
      if (v < mins[j]) mins[j] = v;
      if (v > maxs[j]) maxs[j] = v;
    }
  }
  const norm = [];
  for (let t = 0; t < T; t++) {
    const row = [];
    for (let j = 0; j < D; j++) {
      const v = d.clr[t][j];
      if (v < -10) { row.push(0); continue; }
      const range = maxs[j] - mins[j];
      row.push(range > 0 ? (v - mins[j]) / range : 0.5);
    }
    norm.push(row);
  }
  d.norm = norm;
  d.mins = mins;
  d.maxs = maxs;
  d.vt = d.clr.map(r => Math.sqrt(r.reduce((s,v) => s + v*v, 0)));
  const first = d.clr[0], last = d.clr[T-1];
  const directDist = Math.sqrt(first.reduce((s,v,i) => s + (v - last[i])**2, 0));
  let pathLen = 0;
  for (let t = 1; t < T; t++) {
    pathLen += Math.sqrt(d.clr[t].reduce((s,v,i) => s + (v - d.clr[t-1][i])**2, 0));
  }
  d.pathEff = pathLen > 0 ? directDist / pathLen : 1;
  const vtStart = d.vt[0], vtEnd = d.vt[T-1];
  if (vtEnd > vtStart * 1.2) d.vtShape = 'EXPANDING';
  else if (vtEnd < vtStart * 0.8) d.vtShape = 'CONTRACTING';
  else d.vtShape = 'STABLE';
}

// ============ UI SETUP ============
function initUI() {
  document.getElementById('expTitle').textContent = expTitle;
  const cBtns = document.getElementById('systemBtns');
  cBtns.innerHTML = '';
  systemOrder.forEach(c => {
    const b = document.createElement('button');
    b.className = 'btn system' + (c === currentSystem ? ' active' : '');
    b.textContent = DATA[c].code;
    b.style.setProperty('--cc', DATA[c].color);
    b.id = 'btn_' + c;
    b.onclick = () => {
      currentSystem = c;
      document.querySelectorAll('.btn.system').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      computeScale(DATA[c]);
      updateTimeSlider();
      updateLegend();
    };
    cBtns.appendChild(b);
  });
  computeScale(DATA[currentSystem]);
  updateTimeSlider();
  document.getElementById('dataLegend').style.display = 'block';
  updateLegend();
  if (!animating) { animating = true; requestAnimationFrame(frame); }
}

function updateTimeSlider() {
  const d = DATA[currentSystem];
  const T = d.clr.length;
  const slider = document.getElementById('timeSlider');
  slider.max = T;
  slider.value = T;
  timeIdx = T;
  document.getElementById('timeVal').textContent = 'ALL';
}

// ============ RESIZE ============
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ============ CONTROLS ============
function toggleOrbit() { orbit = !orbit; document.getElementById('btnOrbit').classList.toggle('active', orbit); }
function toggle(key) {
  if (key === 'trails') { trails = !trails; document.getElementById('btnTrails').classList.toggle('active', trails); }
  if (key === 'perturb') { perturb = !perturb; document.getElementById('btnPerturb').classList.toggle('active', perturb); document.getElementById('pertLegend').style.display = perturb ? 'block' : 'none'; }
  if (key === 'colorMode') { colorMode = !colorMode; document.getElementById('btnColor').classList.toggle('active', colorMode); }
  if (key === 'ghost') { ghost = !ghost; document.getElementById('btnGhost').classList.toggle('active', ghost); }
  if (key === 'labels') { labels = !labels; document.getElementById('btnLabels').classList.toggle('active', labels); }
}
function setView(v) {
  if (v === 'front') { rotX = 0; rotY = 0; }
  if (v === 'side') { rotX = 0; rotY = Math.PI/2; }
  if (v === 'top') { rotX = -Math.PI/2; rotY = 0; }
  if (v === 'iso') { rotX = -0.35; rotY = 0.4; }
}
function setTime(v) {
  const d = DATA[currentSystem]; if (!d) return;
  const T = d.clr.length;
  timeIdx = +v;
  document.getElementById('timeVal').textContent = timeIdx >= T ? 'ALL' : d.labels[timeIdx];
}

// ============ MOUSE ============
cv.addEventListener('mousedown', e => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; orbit = false; document.getElementById('btnOrbit').classList.remove('active'); });
window.addEventListener('mouseup', () => { mouseDown = false; });
window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (mouseDown) {
    rotY += (e.clientX - lastMX) * 0.005;
    rotX += (e.clientY - lastMY) * 0.005;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    lastMX = e.clientX; lastMY = e.clientY;
  }
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.max(0.3, Math.min(3, zoom - e.deltaY * 0.002));
  document.getElementById('zoomSlider').value = Math.round(zoom * 100);
}, {passive:false});
cv.addEventListener('dblclick', e => {
  const d = DATA[currentSystem]; if (!d) return;
  let bestDist = Infinity, bestT = -1;
  for (let t = 0; t < d.clr.length; t++) {
    const pts = getPolygonScreenPoints(d, t);
    const cx = pts.reduce((s,p) => s + p.x, 0) / pts.length;
    const cy = pts.reduce((s,p) => s + p.y, 0) / pts.length;
    const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
    if (dist < bestDist) { bestDist = dist; bestT = t; }
  }
  if (bestDist < 80) lockYear = (lockYear === bestT) ? -1 : bestT;
});

// ============ 3D PROJECTION (canonical: FOV=700) ============
const FOV = 700;
function proj(x3, y3, z3) {
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let x = x3 * cosY - z3 * sinY;
  let z = x3 * sinY + z3 * cosY;
  let y = y3 * cosX - z * sinX;
  z = y3 * sinX + z * cosX;
  const sc = FOV / (FOV + z + 350);
  return { x: W/2 + x * sc * zoom, y: H/2 + y * sc * zoom, s: sc * zoom, z: z };
}

// ============ POLYGON GEOMETRY (adaptive) ============
let RADIUS = 140, Z_SPACING = 18, autoZoom = 1.0;

function computeScale(d) {
  const T = d.clr.length;
  const D = d.carriers.length;
  if (T <= 5) { Z_SPACING = 60; RADIUS = 160; }
  else if (T <= 15) { Z_SPACING = 30; RADIUS = 150; }
  else if (T <= 30) { Z_SPACING = 18; RADIUS = 140; }
  else if (T <= 60) { Z_SPACING = 12; RADIUS = 130; }
  else { Z_SPACING = 8; RADIUS = 120; }
  if (D <= 3) RADIUS = Math.max(RADIUS, 180);
  if (D <= 4) RADIUS = Math.max(RADIUS, 160);
  const zExtent = T * Z_SPACING;
  if (zExtent < 200) autoZoom = 1.8;
  else if (zExtent < 400) autoZoom = 1.3;
  else if (zExtent > 800) autoZoom = 0.7;
  else autoZoom = 1.0;
  zoom = autoZoom;
  document.getElementById('zoomSlider').value = Math.round(zoom * 100);
}

function zOffset(d) { return -Math.floor(d.clr.length / 2) * Z_SPACING; }

function getPolygon3D(d, t) {
  const D = d.carriers.length;
  const pts = [];
  const zPos = zOffset(d) + t * Z_SPACING;
  for (let j = 0; j < D; j++) {
    const angle = (j / D) * Math.PI * 2 - Math.PI / 2;
    const r = RADIUS * (0.1 + 0.9 * d.norm[t][j]);
    pts.push({ x: r * Math.cos(angle), y: r * Math.sin(angle), z: zPos, carrier: j });
  }
  return pts;
}

function getPolygonScreenPoints(d, t) { return getPolygon3D(d, t).map(p => proj(p.x, p.y, p.z)); }

// ============ RENDER ============
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function perturbColor(mag) {
  if (mag < 0.5) return '#32cd32';
  if (mag < 1.5) return '#ffd700';
  return '#ff4500';
}

function draw() {
  if (!currentSystem || !DATA[currentSystem]) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#030406';
  ctx.fillRect(0, 0, W, H);

  // XYZ phantom axes
  const axLen = RADIUS * 1.6;
  const org = proj(0, 0, 0);
  const xEnd = proj(axLen, 0, 0);
  ctx.strokeStyle = 'rgba(220,80,80,0.35)'; ctx.lineWidth = 1; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(org.x,org.y); ctx.lineTo(xEnd.x,xEnd.y); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle = 'rgba(220,80,80,0.55)'; ctx.font = '10px Courier New';
  ctx.fillText('X', xEnd.x + 4, xEnd.y - 4);
  const yEnd = proj(0, -axLen, 0);
  ctx.strokeStyle = 'rgba(80,200,80,0.35)'; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(org.x,org.y); ctx.lineTo(yEnd.x,yEnd.y); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle = 'rgba(80,200,80,0.55)';
  ctx.fillText('Y', yEnd.x + 4, yEnd.y - 4);
  const zEnd = proj(0, 0, axLen);
  ctx.strokeStyle = 'rgba(80,120,220,0.35)'; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(org.x,org.y); ctx.lineTo(zEnd.x,zEnd.y); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle = 'rgba(80,120,220,0.55)';
  ctx.fillText('Z (atomic number)', zEnd.x + 4, zEnd.y - 4);

  // Grid floor
  ctx.strokeStyle = 'rgba(64,88,104,0.06)'; ctx.lineWidth = 0.5;
  for (let i = -5; i <= 5; i++) {
    const a = proj(i*40, 200, -200), b = proj(i*40, 200, 300);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    const c = proj(-200, 200, i*40+50), dd = proj(200, 200, i*40+50);
    ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(dd.x,dd.y); ctx.stroke();
  }

  const d = DATA[currentSystem];
  const D = d.carriers.length;
  const T = d.clr.length;

  let showYears = [];
  if (timeIdx >= T) {
    for (let t = 0; t < T; t++) showYears.push(t);
  } else {
    showYears = [timeIdx];
    for (let dt = -2; dt <= 2; dt++) {
      const tt = timeIdx + dt;
      if (tt >= 0 && tt < T && tt !== timeIdx) showYears.push(tt);
    }
  }

  const polys = showYears.map(t => {
    const pts3d = getPolygon3D(d, t);
    const pts2d = pts3d.map(p => proj(p.x, p.y, p.z));
    const avgZ = pts2d.reduce((s,p) => s + p.z, 0) / pts2d.length;
    return { t, pts3d, pts2d, avgZ };
  });
  polys.sort((a,b) => b.avgZ - a.avgZ);

  // Trails
  if (trails && timeIdx >= T) {
    for (let j = 0; j < D; j++) {
      const cc = carrierColor(d.carriers[j], j);
      ctx.strokeStyle = cc + '50'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let t = 0; t < T; t++) {
        const pts3d = getPolygon3D(d, t);
        const p = proj(pts3d[j].x, pts3d[j].y, pts3d[j].z);
        t === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
  }

  // Draw polygons
  polys.forEach(poly => {
    const { t, pts2d } = poly;
    const isFocused = timeIdx >= T || t === timeIdx;
    const isLocked = lockYear === t;
    const depthFactor = Math.max(0.15, Math.min(1, (poly.avgZ + 500) / 700));
    let alpha = isFocused ? (0.12 + 0.12 * depthFactor) : 0.04;
    let strokeAlpha = isFocused ? (0.5 + 0.3 * depthFactor) : 0.15;
    const [cr, cg, cb] = hexToRgb(d.color);

    ctx.beginPath();
    pts2d.forEach((p,i) => i === 0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.closePath();
    if (colorMode) {
      for (let j = 0; j < D; j++) {
        const cc = carrierColor(d.carriers[j], j);
        const [rr,gg,bb] = hexToRgb(cc);
        const cx = pts2d.reduce((s,p) => s+p.x,0)/D;
        const cy = pts2d.reduce((s,p) => s+p.y,0)/D;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(pts2d[j].x, pts2d[j].y);
        ctx.lineTo(pts2d[(j+1)%D].x, pts2d[(j+1)%D].y);
        ctx.closePath();
        ctx.fillStyle = `rgba(${rr},${gg},${bb},${alpha * 1.5})`;
        ctx.fill();
      }
    } else {
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${alpha})`;
      ctx.fill();
    }
    ctx.beginPath();
    pts2d.forEach((p,i) => i === 0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${strokeAlpha})`;
    ctx.lineWidth = isFocused ? 1.2 : 0.6;
    ctx.stroke();

    if (isLocked) {
      ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ffd70080'; ctx.lineWidth = 2;
      ctx.beginPath();
      pts2d.forEach((p,i) => i === 0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
      ctx.closePath(); ctx.stroke(); ctx.shadowBlur = 0;
    }

    if (isFocused && pts2d.length > 0) {
      const lp = pts2d[0];
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${strokeAlpha * 0.8})`;
      ctx.font = '9px Courier New';
      ctx.fillText(d.labels[t], lp.x + 6, lp.y - 3);
    }

    if (isFocused) {
      pts2d.forEach((p, j) => {
        const cc = carrierColor(d.carriers[j], j);
        ctx.fillStyle = cc;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
      });
    }

    if (perturb && t > 0 && isFocused) {
      const pts3d = getPolygon3D(d, t);
      for (let j = 0; j < D; j++) {
        const dclr = Math.abs(d.clr[t][j] - d.clr[t-1][j]);
        if (dclr < 0.05) continue;
        const angle = (j / D) * Math.PI * 2 - Math.PI / 2;
        const spikeLen = Math.min(dclr * 15, 40);
        const r = RADIUS * (0.1 + 0.9 * d.norm[t][j]);
        const outerR = r + spikeLen;
        const sx = outerR * Math.cos(angle), sy = outerR * Math.sin(angle);
        const sp = proj(sx, sy, pts3d[j].z);
        ctx.strokeStyle = perturbColor(dclr); ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(pts2d[j].x, pts2d[j].y); ctx.lineTo(sp.x, sp.y); ctx.stroke();
        ctx.fillStyle = perturbColor(dclr);
        ctx.beginPath(); ctx.arc(sp.x, sp.y, 2, 0, Math.PI*2); ctx.fill();
      }
    }

    if (labels && isFocused) {
      pts2d.forEach((p, j) => {
        const dist = Math.hypot(mouseX - p.x, mouseY - p.y);
        if (dist < 30) {
          ctx.fillStyle = '#8ab8d8'; ctx.font = '10px Courier New';
          ctx.fillText(d.carriers[j] + ': ' + d.clr[t][j].toFixed(3), p.x + 8, p.y - 6);
        }
      });
    }
  });

  // Spoke labels
  if (timeIdx >= T && labels) {
    const t = T - 1;
    for (let j = 0; j < D; j++) {
      const angle = (j / D) * Math.PI * 2 - Math.PI / 2;
      const lx = (RADIUS + 20) * Math.cos(angle), ly = (RADIUS + 20) * Math.sin(angle);
      const lp = proj(lx, ly, zOffset(d) + t * Z_SPACING);
      ctx.fillStyle = carrierColor(d.carriers[j], j) + 'a0';
      ctx.font = '9px Courier New';
      ctx.textAlign = Math.cos(angle) > 0.3 ? 'left' : (Math.cos(angle) < -0.3 ? 'right' : 'center');
      ctx.fillText(d.carriers[j], lp.x, lp.y);
    }
    ctx.textAlign = 'left';
  }

  // Z-axis line
  const za = proj(0, 0, zOffset(d)), zb = proj(0, 0, zOffset(d) + (T-1) * Z_SPACING);
  ctx.strokeStyle = 'rgba(64,88,104,0.15)'; ctx.lineWidth = 0.5; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(za.x,za.y); ctx.lineTo(zb.x,zb.y); ctx.stroke();
  ctx.setLineDash([]);

  updateReadout(d);
}

function updateReadout(d) {
  const T = d.clr.length, D = d.carriers.length;
  const yr = timeIdx < T ? timeIdx : T - 1;
  const vt = d.vt[yr];
  let pertMag = 0;
  if (yr > 0) { for (let j = 0; j < D; j++) pertMag += Math.abs(d.clr[yr][j] - d.clr[yr-1][j]); pertMag /= D; }
  const lockStr = lockYear >= 0 ? d.labels[lockYear] : 'NONE';
  document.getElementById('readout').innerHTML = [
    `<span>${d.name} <span class="val">[${d.code}]</span></span>`,
    `<span>D=<span class="val">${D}</span></span>`,
    `<span>N=<span class="val">${T}</span></span>`,
    `<span>V(t): <span class="val">${d.vtShape}</span></span>`,
    `<span>Path eff: <span class="val">${d.pathEff.toFixed(3)}</span></span>`,
    `<span>Lock: <span class="val">${lockStr}</span></span>`,
    `<span>Step: <span class="val">${timeIdx < T ? d.labels[timeIdx] : 'ALL'}</span></span>`,
    `<span>|V(t)|: <span class="val">${vt.toFixed(3)}</span></span>`,
    `<span>|dCLR|: <span class="val">${pertMag.toFixed(3)}</span></span>`
  ].join('');
}

// ============ LEGEND ============
function updateLegend() {
  const d = DATA[currentSystem]; if (!d) return;
  const D = d.carriers.length, T = d.clr.length;
  let html = '';
  html += '<div class="dl-section">SYSTEMS</div>';
  systemOrder.forEach(key => {
    const s = DATA[key];
    const active = key === currentSystem ? ' style="color:#8ab8d8"' : '';
    html += `<div class="dl-sys"${active}><div class="dl-swatch" style="background:${s.color}"></div>${s.name} [${s.code}]</div>`;
  });
  html += '<div class="dl-section">CARRIERS (D=' + D + ')</div>';
  d.carriers.forEach((c, i) => {
    html += `<div class="dl-item"><div class="dl-dot" style="background:${carrierColor(c, i)}"></div>${c}</div>`;
  });
  html += '<div class="dl-section">METRICS</div>';
  html += `<div class="dl-item">N = <span class="dl-val">${T} nuclides (Z=1-92)</span></div>`;
  html += `<div class="dl-item">Path eff = <span class="dl-val">${d.pathEff.toFixed(3)}</span></div>`;
  html += `<div class="dl-item">V(t) shape = <span class="dl-val">${d.vtShape}</span></div>`;
  html += `<div class="dl-item">Range: <span class="dl-val">${d.labels[0]} to ${d.labels[T-1]}</span></div>`;
  html += '<div class="dl-section">AXES</div>';
  html += '<div class="dl-item"><div class="dl-dot" style="background:rgba(220,80,80,0.8)"></div><span style="color:#dc5050">X</span> — radial</div>';
  html += '<div class="dl-item"><div class="dl-dot" style="background:rgba(80,200,80,0.8)"></div><span style="color:#50c850">Y</span> — radial</div>';
  html += '<div class="dl-item"><div class="dl-dot" style="background:rgba(80,120,220,0.8)"></div><span style="color:#5078dc">Z</span> — atomic number</div>';
  document.getElementById('dataLegend').innerHTML = html;
}

// ============ ANIMATION ============
let lastFrame = 0;
function frame(ts) {
  const dt = ts - lastFrame; lastFrame = ts;
  if (orbit) { orbitAngle += 0.0005 * dt; rotY = orbitAngle; }
  draw();
  requestAnimationFrame(frame);
}

// ============ AUTO-LOAD ============
loadEmbedded();
</script>
