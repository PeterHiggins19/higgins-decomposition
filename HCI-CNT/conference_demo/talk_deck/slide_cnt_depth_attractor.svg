<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <title>CNT depth tower → period-2 attractor → IR class  (additions)</title>
  <rect width="1000" height="560" fill="#1a1a1a"/>
  <style>
    text { font-family: 'Arial', 'Helvetica', sans-serif; fill: #e0e0e0; }
    .title { font-size: 26px; font-weight: 700; fill: #ffffff; }
    .label { font-size: 17px; fill: #cccccc; }
    .label-bold { font-size: 18px; font-weight: 700; fill: #ffffff; }
    .small { font-size: 14px; fill: #aaaaaa; }
    .ok { font-size: 17px; fill: #80d050; font-weight: 700; }
    .accent { font-size: 17px; fill: #66aaff; font-weight: 700; }
    .num { font-size: 22px; font-weight: 700; fill: #f0c020; font-family: 'Georgia', serif; }
    .math { font-size: 19px; font-family: 'Georgia', serif; font-style: italic; fill: #e8e8e8; }
    .box-cnt { fill: #2a2a3a; stroke: #66aaff; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cccccc"/>
    </marker>
  </defs>
  <text x="500" y="38" text-anchor="middle" class="title">Math step 6+7 — Depth tower → period-2 attractor → IR class</text>
  <text x="500" y="62" text-anchor="middle" class="small">CNT additions, built on the M² = I contraction certificate.</text>

  <rect x="40" y="100" width="280" height="320" class="box-cnt"/>
  <text x="180" y="130" text-anchor="middle" class="label-bold">DEPTH TOWER</text>
  <text x="180" y="160" text-anchor="middle" class="small">Energy and curvature towers</text>
  <text x="180" y="180" text-anchor="middle" class="small">recursively iterate the metric dual</text>
  <text x="180" y="220" text-anchor="middle" class="math">level k → level k+1</text>
  <text x="180" y="250" text-anchor="middle" class="small">at each level: ω(k), Hs(k)</text>
  <text x="180" y="290" text-anchor="middle" class="small">convergence:</text>
  <text x="180" y="313" text-anchor="middle" class="small">ω(k) → noise floor</text>
  <text x="180" y="345" text-anchor="middle" class="ok">Banach satisfied → stop</text>
  <text x="180" y="395" text-anchor="middle" class="small">depth = number of levels</text>

  <line x1="330" y1="260" x2="380" y2="260" stroke="#cccccc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="390" y="100" width="280" height="320" class="box-cnt"/>
  <text x="530" y="130" text-anchor="middle" class="label-bold">PERIOD-2 ATTRACTOR</text>
  <text x="530" y="160" text-anchor="middle" class="small">tower converges to two</text>
  <text x="530" y="180" text-anchor="middle" class="small">alternating Hs samples</text>
  <text x="530" y="220" text-anchor="middle" class="math">c_even, c_odd</text>
  <text x="530" y="260" text-anchor="middle" class="num">A = | c_even - c_odd |</text>
  <text x="530" y="290" text-anchor="middle" class="small">amplitude is the headline</text>
  <text x="530" y="312" text-anchor="middle" class="small">structural diagnostic</text>
  <text x="530" y="350" text-anchor="middle" class="small">Lyapunov, residual, period</text>
  <text x="530" y="372" text-anchor="middle" class="small">all recorded in JSON</text>
  <text x="530" y="402" text-anchor="middle" class="ok">contraction ratio &lt; 1</text>

  <line x1="680" y1="260" x2="730" y2="260" stroke="#cccccc" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="740" y="100" width="220" height="320" class="box-cnt"/>
  <text x="850" y="130" text-anchor="middle" class="label-bold">IR CLASS  (8)</text>
  <text x="760" y="160" class="small">CRITICALLY_DAMPED</text>
  <text x="760" y="183" class="small">LIGHTLY_DAMPED</text>
  <text x="760" y="206" class="small">MODERATELY_DAMPED</text>
  <text x="760" y="229" class="small">OVERDAMPED_EXTREME</text>
  <text x="760" y="252" class="small">UNDAMPED</text>
  <text x="760" y="275" class="small">ENERGY_STABLE_FIXED</text>
  <text x="760" y="298" class="small">CURVATURE_VERTEX_FLAT</text>
  <text x="760" y="321" class="small">D2_DEGENERATE</text>
  <text x="850" y="365" text-anchor="middle" class="small">classification by</text>
  <text x="850" y="385" text-anchor="middle" class="small">A and tower termination</text>

  <text x="500" y="465" text-anchor="middle" class="label">Each box is one block in diagnostics.depth.higgins_extensions of every CNT JSON.</text>
  <text x="500" y="495" text-anchor="middle" class="label">Anyone with the engine can recompute the chain and verify the IR class.</text>
  <text x="500" y="540" text-anchor="middle" class="small">These structures sit alongside the established CoDa toolkit — additions, not replacements.</text>
</svg>
