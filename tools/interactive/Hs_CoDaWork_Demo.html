// ──────────────── DATASET A: SEMF ────────────────
function generateSEMF() {
  const aV=15.56, aS=17.23, aC=0.7, aA=23.285, aP=12.0;
  const data = [];
  for (let Z=1; Z<=92; Z++) {
    const A = Math.round(2.5*Z);
    const vol = aV*A, surf = aS*Math.pow(A,2/3), coul = aC*Z*(Z-1)/Math.pow(A,1/3);
    const asym = aA*Math.pow(A-2*Z,2)/A;
    let pair = 0;
    if (Z%2===0 && (A-Z)%2===0) pair = aP/Math.sqrt(A);
    else if (Z%2===1 && (A-Z)%2===1) pair = -aP/Math.sqrt(A);
    const p1=Math.abs(vol), p2=Math.abs(surf)+Math.abs(coul), p3=Math.abs(asym)+Math.abs(pair);
    const tot = p1+p2+p3;
    if (tot > 0) data.push([p1/tot, p2/tot, p3/tot]);
  }
  return data;
}

function buildRadioData() {
  return RADIO_RAW.map(r => {
    const tot = r.ke + r.gam + r.rec + r.nu;
    return [r.ke/tot, r.gam/tot, r.rec/tot, r.nu/tot];
  });
}

const RADIO_CONFIG = {
  name: 'Radionuclides',
  data: buildRadioData(),
  carriers: ['Particle KE', 'Gamma', 'Recoil', 'Neutrino'],
  colors: [BLUE, GREEN, ORANGE, PURPLE],
  D: 4,
  cycleMs: 25000,
  labels: RADIO_RAW.map(r => `${r.iso} (${r.type})`),
  chainLabels: RADIO_RAW.map(r => r.chain),
  matchConst: '1/(e^π)',
  matchValue: 1/Math.pow(Math.E, Math.PI),
  matchDelta: '0.00778',
  matchIdx: null, // detected dynamically
  matchLabel: 'Combined 39-step',
  hvldShape: 'hill',
  hvldR2: '0.779',
  classification: 'NATURAL',
  eittPass: false,
  eittNote: 'FAIL (nuclear turbulence)',
  badgeClass: 'badge-radio',
  info: [
    {title:'What is being decomposed',
     html:'<span class="val">Three natural radioactive decay chains</span> — U-238→Pb-206 (14 steps), Th-232→Pb-208 (10 steps), U-235→Pb-207 (15 steps with all branches). Each decay step partitions its Q-value into four carriers:<br><span style="color:#58A6FF">Particle KE</span> (α/β) • <span style="color:#3FB950">Gamma</span> (radiation) • <span style="color:#F0883E">Recoil</span> (daughter nucleus) • <span style="color:#BC8CFF">Neutrino</span> (β decays only)'},
    {title:'Iterative discovery',
     html:'<span class="val">Run 1</span> used 3 carriers (no neutrino) → U-235 flagged <span style="color:#F85149">FLAG</span> + <span style="color:#F85149">EITT FAIL</span>. The warnings were diagnostic <em>questions</em>: what energy channel is missing? <span class="val">Run 2</span> added the neutrino carrier + branch transitions → combined chain now detects <span class="euler">1/(e^π)</span> at <span class="highlight">δ = 0.00778</span>. Gelfond\'s constant reciprocal. The tool asks. The expert answers. New structure appears.'},
    {title:'About this tool',
     html:'<span class="val">Hˢ (Higgins Decomposition)</span> — a deterministic 12-step pipeline for compositional inference on the Aitchison simplex. <span class="highlight">17 domains</span> tested across <span class="highlight">44 orders of magnitude</span> (quarks → cosmos). 35 transcendental constants • 59 diagnostic codes • 5 languages.<br><span style="color:#58A6FF">github.com/PeterHiggins19/higgins-decomposition</span><br><span style="color:#484F58">Peter Higgins • CoDaWork 2026 • Coimbra</span>'}

// ──────────────── ENGINE ────────────────
const DATASETS = [SEMF_CONFIG, RADIO_CONFIG];
let dsIdx = 0;

let CFG, DATA, N_pts, STEP_MS;
let currentIdx = 0;
let sigma2 = [];
let clrData = [];
let entropy = [];
let running = true;
let panels;

const LANGS = ['EN','中文','हिन्दी','PT','IT'];
const DISCOVERIES = {
  'EN': 'Euler-family constant detected',
  '中文': '检测到欧拉族常数',
  'हिन्दी': 'ऑयलर-परिवार स्थिरांक का पता चला',
  'PT': 'Constante da família de Euler detectada',
  'IT': 'Costante della famiglia di Eulero rilevata'
};
let langIdx = 0;

const STEPS = [
  '1. Define system', '2. Identify carriers', '3. Load data',
  '4. Close to simplex', '5. CLR transform', '6. Aitchison variance',
  '7. HVLD vertex lock', '8. Super squeeze (35 constants)',
  '9. EITT entropy', '10. Ternary projection',
  '11. Complex plane', '12. 3D Helix/Polar'
];

function loadDataset(idx) {
  CFG = DATASETS[idx];
  DATA = CFG.data;
  N_pts = DATA.length;
  STEP_MS = CFG.cycleMs / N_pts;
  currentIdx = 0;
  sigma2 = new Array(N_pts).fill(0);
  clrData = DATA.map(row => clr(row));
  entropy = [];

  // Update badge
  const badge = document.getElementById('datasetBadge');
  badge.textContent = CFG.name === 'SEMF' ? 'SEMF • D=3 • N=92' : 'Radionuclides • D=4 • N=39';
  badge.className = 'dataset-badge ' + CFG.badgeClass;

  // Update info bar
  const bar = document.getElementById('infoBar');
  bar.innerHTML = CFG.info.map(c =>
    `<div class="info-col"><h3>${c.title}</h3>${c.html}</div>`
  ).join('');
}

// CLR transform (works for any D)
function clr(row) {
  const D = row.length;
  const logRow = row.map(v => Math.log(Math.max(v, 1e-15)));
  const mean = logRow.reduce((a,b)=>a+b,0) / D;
  return logRow.map(v => v - mean);
}

function computeVariance(clrArr, t) {
  if (t < 2) return 0;
  const window = clrArr.slice(0, t+1);
  const D = window[0].length;
  let totalVar = 0;
  for (let j = 0; j < D; j++) {
    const col = window.map(r => r[j]);
    const mean = col.reduce((a,b)=>a+b,0) / col.length;
    totalVar += col.reduce((a,v)=>a+(v-mean)**2, 0) / col.length;
  }
  return totalVar;
}

function shannonH(row) {
  const D = row.length;
  let h = 0;
  for (const p of row) if (p > 0) h -= p * Math.log(p);
  return h / Math.log(D); // normalised by H_max = ln(D)
}

function toTernary(row) {
  // For D=3: standard barycentric
  // For D=4: project first 3 CLR components or merge last two carriers
  let a, b, c;
  if (row.length === 3) {
    a = row[0]; b = row[1]; c = row[2];
  } else {
    // Merge carriers 2+3 (Recoil+Neutrino) for ternary visualisation
    a = row[0]; b = row[1]; c = row[2] + row[3];
  }
  const s = a + b + c;
  const x = 0.5*(2*b+c)/s;
  const y = (Math.sqrt(3)/2)*c/s;
  return [x, y];
}

function setupCanvas(id) {
  const canvas = document.getElementById(id);
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  return { canvas, ctx, w: rect.width, h: rect.height };
}

function init() {
  panels = [1,2,3,4,5,6].map(i => setupCanvas('c'+i));
  loadDataset(0);
  window.addEventListener('resize', () => {
    panels = [1,2,3,4,5,6].map(i => setupCanvas('c'+i));
  });
  animate();
}

function animate() {
  if (!running) return;

  if (currentIdx < N_pts) {
    sigma2[currentIdx] = computeVariance(clrData, currentIdx);
    entropy.push(shannonH(DATA[currentIdx]));
  }

  // Step display
  const stepIdx = Math.min(Math.floor(currentIdx / N_pts * 12), 11);
  const label = currentIdx < N_pts ? CFG.labels[currentIdx] : CFG.labels[N_pts-1];
  document.getElementById('stepDisplay').textContent =
    `Step ${stepIdx+1}/12: ${STEPS[stepIdx]} — ${label}`;

  // Progress
  document.getElementById('progressBar').style.width = `${(currentIdx/N_pts*100).toFixed(0)}%`;

  // Code stream
  const progress = currentIdx / N_pts;
  let streamText;
  if (CFG.name === 'SEMF') {
    streamText = currentIdx >= 37 ?
      `[S8-EUL-DIS] ★ ${CFG.matchConst} δ=${CFG.matchDelta} at ${CFG.matchLabel}` :
      `Processing ${label}...`;
  } else {
    // Radionuclide: show chain transitions
    const chain = currentIdx < N_pts ? RADIO_RAW[currentIdx].chain : '';
    const chainName = chain.startsWith('U238') ? 'U-238→Pb-206' :
                      chain.startsWith('Th232') ? 'Th-232→Pb-208' :
                      chain.startsWith('U235') ? 'U-235→Pb-207' : '';
    if (progress > 0.85) {
      streamText = `[S8-EUL-DIS] ★ ${CFG.matchConst} δ=${CFG.matchDelta} — ${CFG.matchLabel}`;
    } else {
      streamText = `[${chainName}] ${label}`;
    }
  }
  document.getElementById('codeStream').textContent = streamText;

  // Language cycling
  if (currentIdx % Math.max(1, Math.floor(N_pts/5)) === 0 && currentIdx > 0) {
    langIdx = (langIdx + 1) % LANGS.length;
    document.getElementById('langDisplay').textContent = LANGS[langIdx];
  }

  // Flash discovery at key moment
  const flashPoint = CFG.name === 'SEMF' ? 37 : Math.floor(N_pts * 0.85);
  if (currentIdx === flashPoint) {
    const flash = document.getElementById('code2');
    flash.textContent = `[S8-EUL-DIS] ${DISCOVERIES[LANGS[langIdx]]}`;
    flash.classList.add('visible');
    setTimeout(() => flash.classList.remove('visible'), 3000);
  }

  // Draw all panels
  drawPanel1(currentIdx);
  drawPanel2(currentIdx);
  drawPanel3(currentIdx);
  drawPanel4(currentIdx);
  drawPanel5(currentIdx);
  drawPanel6(currentIdx);

  currentIdx++;

  if (currentIdx >= N_pts) {
    setTimeout(() => {
      // Alternate dataset
      dsIdx = (dsIdx + 1) % DATASETS.length;
      langIdx = (langIdx + 1) % LANGS.length;
      loadDataset(dsIdx);
      animate();
    }, 4000); // 4s hold at end
  } else {
    setTimeout(animate, STEP_MS);
  }
}

// ──────────────── PANEL 1: Raw Data Bars ────────────────
function drawPanel1(t) {
  const {ctx, w, h} = panels[0];
  ctx.fillStyle = BG; ctx.fillRect(0, 0, w, h);
  const padT=30, padB=35, padL=40, padR=10;
  const plotW = w-padL-padR, plotH = h-padT-padB;
  if (t >= N_pts) return;

  const row = DATA[t];
  const D = row.length;
  const gap = plotW / (D + 1);
  const barW = gap * 0.6;

  for (let j = 0; j < D; j++) {
    const bh = row[j] * plotH;
    const x = padL + (j + 0.5) * gap;
    const y = padT + plotH - bh;

    ctx.fillStyle = CFG.colors[j];
    ctx.globalAlpha = 0.85;
    ctx.fillRect(x, y, barW, bh);
    ctx.globalAlpha = 1;

    // Percentage
    ctx.fillStyle = CFG.colors[j];
    ctx.font = '10px Consolas'; ctx.textAlign = 'center';
    ctx.fillText(`${(row[j]*100).toFixed(1)}%`, x + barW/2, y - 5);
    // Carrier name
    ctx.font = '9px Segoe UI';
    ctx.fillText(CFG.carriers[j], x + barW/2, padT + plotH + 12);
  }

  // Current label
  ctx.fillStyle = TEXT; ctx.font = 'bold 12px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText(CFG.labels[t], padL, padT + plotH + 28);

  // If radionuclide, show chain colour band
  if (CFG.name === 'Radionuclides') {
    const raw = RADIO_RAW[t];
    const chainColor = raw.chain.startsWith('U238') ? BLUE :
                       raw.chain.startsWith('Th232') ? CYAN :
                       raw.chain.startsWith('U235b') ? PINK : ORANGE;
    ctx.fillStyle = chainColor; ctx.globalAlpha = 0.6;
    ctx.fillRect(w - 8, padT, 4, plotH);
    ctx.globalAlpha = 1;
    ctx.font = '9px Consolas'; ctx.textAlign = 'right'; ctx.fillStyle = chainColor;
    const cn = raw.chain.startsWith('U238') ? 'U-238' :
               raw.chain.startsWith('Th232') ? 'Th-232' :
               raw.chain.startsWith('U235b') ? 'U-235 branch' : 'U-235';
    ctx.fillText(cn, w - 14, padT + 10);
  }

  // Closure check
  ctx.fillStyle = GREEN; ctx.font = '11px Consolas'; ctx.textAlign = 'right';
  ctx.fillText('Σ = 1.000 ✓', w - padR, padT - 5);
}

// ──────────────── PANEL 2: σ²_A Trajectory + HVLD ────────────────
function drawPanel2(t) {
  const {ctx, w, h} = panels[1];
  ctx.fillStyle = BG; ctx.fillRect(0, 0, w, h);
  const padT=30, padB=25, padL=50, padR=20;
  const plotW = w-padL-padR, plotH = h-padT-padB;
  if (t < 3) return;

  const valid = sigma2.slice(2, t+1);
  if (valid.length === 0) return;

  const maxV = Math.max(...valid) * 1.1 || 1;

  // Grid
  ctx.strokeStyle = GRID; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padT + plotH * i / 4;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w-padR, y); ctx.stroke();
    ctx.fillStyle = DIM; ctx.font = '9px Consolas'; ctx.textAlign = 'right';
    ctx.fillText((maxV * (1 - i/4)).toFixed(3), padL-5, y+3);
  }

  // Trajectory
  ctx.strokeStyle = BLUE; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < valid.length; i++) {
    const x = padL + (i / Math.max(N_pts-3, 1)) * plotW;
    const y = padT + plotH * (1 - valid[i] / maxV);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Transcendental constant line
  const constVal = CFG.matchValue;
  if (constVal < maxV) {
    const yLine = padT + plotH * (1 - constVal / maxV);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 1; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(padL, yLine); ctx.lineTo(w-padR, yLine); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = GOLD; ctx.font = '9px Consolas'; ctx.textAlign = 'left';
    ctx.fillText(`${CFG.matchConst} = ${constVal.toFixed(5)}`, padL + 5, yLine - 5);
  }

  // Mark crossing point if we've reached it
  if (CFG.name === 'SEMF' && t >= 36) {
    const crossIdx = 36;
    if (crossIdx < valid.length) {
      const cx = padL + (crossIdx / Math.max(N_pts-3, 1)) * plotW;
      const cy = padT + plotH * (1 - valid[crossIdx] / maxV);
      ctx.fillStyle = GOLD;
      ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
      ctx.font = 'bold 10px Consolas';
      ctx.fillText(CFG.matchLabel, cx + 8, cy - 8);
      ctx.fillText(`δ=${CFG.matchDelta}`, cx + 8, cy + 5);
    }
  }

  // For radionuclides, mark chain boundaries
  if (CFG.name === 'Radionuclides') {
    const boundaries = [{idx:14, label:'Th-232 →', color:CYAN}, {idx:24, label:'U-235 →', color:ORANGE}];
    for (const b of boundaries) {
      if (b.idx - 2 < valid.length) {
        const bx = padL + ((b.idx-2) / Math.max(N_pts-3, 1)) * plotW;
        ctx.strokeStyle = b.color; ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
        ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(bx, padT); ctx.lineTo(bx, padT+plotH); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha = 1;
        ctx.fillStyle = b.color; ctx.font = '8px Segoe UI'; ctx.textAlign = 'left';
        ctx.fillText(b.label, bx+3, padT+12);
      }
    }
  }

  // HVLD label
  const progress = t / N_pts;
  ctx.fillStyle = progress > 0.3 ? GREEN : DIM;
  ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'right';
  ctx.fillText(progress > 0.3 ? `HVLD: ${CFG.hvldShape} R²=${CFG.hvldR2}` : 'HVLD: computing...', w-padR, padT-5);
}

// ──────────────── PANEL 3: Ternary Projection ────────────────
function drawPanel3(t) {
  const {ctx, w, h} = panels[2];
  ctx.fillStyle = BG; ctx.fillRect(0, 0, w, h);
  const padT=30, padB=15, padL=15, padR=15;

  const ternPts = [];
  for (let i = 0; i <= Math.min(t, N_pts-1); i++) {
    ternPts.push(toTernary(DATA[i]));
  }
  if (ternPts.length === 0) return;

  // Auto-zoom
  let minX=1,maxX=0,minY=1,maxY=0;
  for (const [tx,ty] of ternPts) { minX=Math.min(minX,tx); maxX=Math.max(maxX,tx); minY=Math.min(minY,ty); maxY=Math.max(maxY,ty); }
  const padFrac = 0.15;
  const rangeX = (maxX-minX)||0.01, rangeY = (maxY-minY)||0.01;
  minX -= rangeX*padFrac; maxX += rangeX*padFrac;
  minY -= rangeY*padFrac; maxY += rangeY*padFrac;

  const plotW = w-padL-padR, plotH = h-padT-padB;
  function toScreen(tx, ty) {
    return [padL + (tx-minX)/(maxX-minX)*plotW, padT + plotH - (ty-minY)/(maxY-minY)*plotH];
  }

  // Simplex boundary
  ctx.strokeStyle = GRID; ctx.lineWidth = 0.5;
  const triPts = [[0,0],[1,0],[0.5,Math.sqrt(3)/2]];
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const [sx,sy] = toScreen(triPts[i][0], triPts[i][1]);
    const [ex,ey] = toScreen(triPts[(i+1)%3][0], triPts[(i+1)%3][1]);
    ctx.moveTo(sx,sy); ctx.lineTo(ex,ey);
  }
  ctx.stroke();

  // Labels
  const ternCarriers = CFG.D === 3 ? CFG.carriers :
    [CFG.carriers[0], CFG.carriers[1], CFG.carriers[2]+'+'+CFG.carriers[3]];
  ctx.fillStyle = CFG.colors[0]; ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText(ternCarriers[0], padL, h-5);
  ctx.fillStyle = CFG.colors[1]; ctx.textAlign = 'right';
  ctx.fillText(ternCarriers[1], w-padR, h-5);
  ctx.fillStyle = CFG.D === 3 ? CFG.colors[2] : ORANGE; ctx.textAlign = 'center';
  ctx.fillText(ternCarriers[2], w/2, padT-5);

  // Connecting line
  ctx.strokeStyle = 'rgba(88,166,255,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < ternPts.length; i++) {
    const [sx, sy] = toScreen(ternPts[i][0], ternPts[i][1]);
    if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // Points
  for (let i = 0; i < ternPts.length; i++) {
    const [sx, sy] = toScreen(ternPts[i][0], ternPts[i][1]);
    const alpha = i === t ? 1.0 : Math.max(0.2, 1 - (t-i)/(N_pts*0.5));
    const r = i === t ? 5 : 2.5;
    let hue;
    if (CFG.name === 'Radionuclides') {
      const chain = RADIO_RAW[i] ? RADIO_RAW[i].chain : '';
      hue = chain.startsWith('U238') ? 210 : chain.startsWith('Th232') ? 170 : chain.startsWith('U235b') ? 320 : 30;
    } else {
      hue = (i/N_pts) * 240;
    }
    ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
  }

  // Label current
  if (t < N_pts) {
    const [sx,sy] = toScreen(ternPts[ternPts.length-1][0], ternPts[ternPts.length-1][1]);
    ctx.fillStyle = TEXT; ctx.font = '9px Consolas'; ctx.textAlign = 'left';
    ctx.fillText(CFG.labels[t].split(' ')[0], sx+7, sy-3);
  }
}

// ──────────────── PANEL 4: Entropy ────────────────
function drawPanel4(t) {
  const {ctx, w, h} = panels[3];
  ctx.fillStyle = BG; ctx.fillRect(0, 0, w, h);
  const padT=30, padB=20, padL=45, padR=15;
  const plotW = w-padL-padR, plotH = h-padT-padB;
  if (entropy.length < 2) return;

  ctx.strokeStyle = GREEN; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < entropy.length; i++) {
    const x = padL + (i / Math.max(N_pts-1, 1)) * plotW;
    const y = padT + plotH * (1 - entropy[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Mean line
  const mean = entropy.reduce((a,b)=>a+b,0) / entropy.length;
  const yMean = padT + plotH * (1 - mean);
  ctx.strokeStyle = RED; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(padL, yMean); ctx.lineTo(w-padR, yMean); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = TEXT; ctx.font = '10px Consolas'; ctx.textAlign = 'right';
  ctx.fillText(`H̄ = ${mean.toFixed(4)}`, w-padR, padT - 5);

  // EITT badge
  const progress = t / N_pts;
  if (progress > 0.5) {
    if (CFG.eittPass) {
      ctx.fillStyle = GREEN; ctx.font = 'bold 10px Consolas';
      ctx.fillText('EITT: PASS ✓', w-padR, padT + 12);
    } else {
      ctx.fillStyle = ORANGE; ctx.font = 'bold 10px Consolas';
      ctx.fillText(CFG.eittNote || 'EITT: FAIL', w-padR, padT + 12);
    }
  }

  // For radionuclides, show chain boundaries with color bands
  if (CFG.name === 'Radionuclides') {
    const b1 = padL + (14/N_pts) * plotW;
    const b2 = padL + (24/N_pts) * plotW;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = BLUE; ctx.fillRect(padL, padT, b1-padL, plotH);
    ctx.fillStyle = CYAN; ctx.fillRect(b1, padT, b2-b1, plotH);
    ctx.fillStyle = ORANGE; ctx.fillRect(b2, padT, padL+plotW-b2, plotH);
    ctx.globalAlpha = 1;
  }
}

// ──────────────── PANEL 5: Complex Plane ────────────────
function drawPanel5(t) {
  const {ctx, w, h} = panels[4];
  ctx.fillStyle = BG; ctx.fillRect(0, 0, w, h);
  const padT=30, padB=15, padL=15, padR=15;
  if (t < 2) return;

  const cplxPts = [];
  let sumRe=0, sumIm=0;
  for (let i = 0; i <= Math.min(t, N_pts-1); i++) {
    sumRe += clrData[i][0]; sumIm += clrData[i][1];
  }
  const centRe = sumRe/(t+1), centIm = sumIm/(t+1);
  for (let i = 0; i <= Math.min(t, N_pts-1); i++) {
    cplxPts.push([clrData[i][0] - centRe, clrData[i][1] - centIm]);
  }

  let minRe=Infinity,maxRe=-Infinity,minIm=Infinity,maxIm=-Infinity;
  for (const [re,im] of cplxPts) { minRe=Math.min(minRe,re); maxRe=Math.max(maxRe,re); minIm=Math.min(minIm,im); maxIm=Math.max(maxIm,im); }
  const maxRange = Math.max((maxRe-minRe)||0.001, (maxIm-minIm)||0.001);
  const midRe = (minRe+maxRe)/2, midIm = (minIm+maxIm)/2;
  const halfR = maxRange/2 * 1.2;

  const plotW = w-padL-padR, plotH = h-padT-padB;
  const plotSize = Math.min(plotW, plotH);
  const offX = padL + (plotW-plotSize)/2, offY = padT + (plotH-plotSize)/2;

  function toScreen(re, im) {
    return [offX + (re-midRe+halfR)/(2*halfR)*plotSize,
            offY + plotSize - (im-midIm+halfR)/(2*halfR)*plotSize];
  }

  // Axes
  const [ox, oy] = toScreen(0, 0);
  ctx.strokeStyle = GRID; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(offX, oy); ctx.lineTo(offX+plotSize, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, offY); ctx.lineTo(ox, offY+plotSize); ctx.stroke();
  ctx.fillStyle = DIM; ctx.font = '9px Consolas';
  ctx.textAlign = 'left'; ctx.fillText('Re(CLR)', offX+plotSize-40, oy-5);
  ctx.textAlign = 'center'; ctx.fillText('Im(CLR)', ox+8, offY+10);

  // Centroid
  ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(ox, oy, 3, 0, Math.PI*2); ctx.fill();

  // Line
  ctx.strokeStyle = 'rgba(188,140,255,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < cplxPts.length; i++) {
    const [sx, sy] = toScreen(cplxPts[i][0], cplxPts[i][1]);
    if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // Points
  for (let i = 0; i < cplxPts.length; i++) {
    const [sx, sy] = toScreen(cplxPts[i][0], cplxPts[i][1]);
    const alpha = i === t ? 1.0 : Math.max(0.2, 1 - (t-i)/(N_pts*0.5));
    const r = i === t ? 5 : 2;
    let hue;
    if (CFG.name === 'Radionuclides') {
      const chain = RADIO_RAW[i] ? RADIO_RAW[i].chain : '';
      hue = chain.startsWith('U238') ? 210 : chain.startsWith('Th232') ? 170 : chain.startsWith('U235b') ? 320 : 30;
    } else {
      hue = (i/N_pts) * 300;
    }
    ctx.fillStyle = `hsla(${hue}, 70%, 55%, ${alpha})`;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
  }

  // Radius line to current point
  if (cplxPts.length > 0) {
    const last = cplxPts[cplxPts.length-1];
    const [lx,ly] = toScreen(last[0], last[1]);
    ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(lx, ly); ctx.stroke();
    const radius = Math.sqrt(last[0]**2 + last[1]**2);
    ctx.fillStyle = GOLD; ctx.font = '9px Consolas'; ctx.textAlign = 'left';
    ctx.fillText(`r=${radius.toFixed(3)}`, lx+6, ly-4);
  }
}

// ──────────────── PANEL 6: Diagnostic Codes ────────────────
function drawPanel6(t) {
  const {ctx, w, h} = panels[5];
  ctx.fillStyle = BG; ctx.fillRect(0, 0, w, h);
  const lineH = 16, padT = 28, padL = 10;
  const progress = t / N_pts;
  const activeCodes = [];

  if (progress > 0) activeCodes.push({code:'GD-ALL-INF', text:'All guards passed', color:GREEN});
  if (progress > 0.02) activeCodes.push({code:'S4-CLO-INF', text:'Closure: Σ=1.000 ✓', color:GREEN});
  if (progress > 0.05) activeCodes.push({code:'S5-CLR-INF', text:'CLR transform complete', color:GREEN});
  if (progress > 0.1) activeCodes.push({code:'S6-VAR-INF', text:`σ²_A = ${sigma2[Math.min(t,N_pts-1)].toFixed(6)}`, color:BLUE});
  if (progress > 0.25) {
    const shapeCode = CFG.hvldShape === 'bowl' ? 'S7-BWL-INF' : 'S7-HIL-INF';
    activeCodes.push({code:shapeCode, text:`HVLD: ${CFG.hvldShape} R²=${CFG.hvldR2}`, color:BLUE});
  }
  if (progress > 0.4) {
    activeCodes.push({code:'S8-NAT-INF', text:`Classification: ${CFG.classification}`, color:GREEN});
    activeCodes.push({code:'S8-EUL-DIS', text:`★ ${DISCOVERIES[LANGS[langIdx]]}`, color:GOLD});
    activeCodes.push({code:'S8-TGT-DIS', text:`${CFG.matchConst} δ=${CFG.matchDelta}`, color:GOLD});
  }
  if (progress > 0.5) {
    if (CFG.eittPass) {
      activeCodes.push({code:'S9-EIT-INF', text:'EITT: PASS (<5% variation)', color:GREEN});
    } else {
      activeCodes.push({code:'S9-EIF-WRN', text:'EITT: FAIL — compositional turbulence', color:ORANGE});
      activeCodes.push({code:'S9-CHH-DIS', text:`High chaos: ${Math.floor(progress*N_pts)} turbulence events`, color:ORANGE});
    }
  }
  if (progress > 0.6) {
    if (CFG.name === 'SEMF') {
      activeCodes.push({code:'S9-REV-DIS', text:`Reversals: ${Math.floor(progress*87)}`, color:ORANGE});
    } else {
      activeCodes.push({code:'S9-REV-DIS', text:`Reversals: ${Math.floor(progress*32)}`, color:ORANGE});
    }
  }
  if (progress > 0.7) {
    if (CFG.name === 'SEMF') {
      activeCodes.push({code:'XU-PCD-DIS', text:'Dominant: Sym+Pairing (45%)', color:CYAN});
    } else {
      activeCodes.push({code:'XU-DRD-DIS', text:'Drift decreasing — system converging', color:CYAN});
      activeCodes.push({code:'XC-ZCR-DIS', text:'Zero-crossings: Neutrino near boundary', color:PURPLE});
    }
  }
  if (progress > 0.8) {
    if (CFG.name === 'SEMF') {
      activeCodes.push({code:'XC-TEF-DIS', text:'TE: Surf+Coul → Sym+Pair', color:PURPLE});
    } else {
      activeCodes.push({code:'XC-RPV-DIS', text:'Volatile: ln(Recoil/Neutrino) CV=507%', color:RED});
      activeCodes.push({code:'XC-PIR-DIS', text:'PID: carriers share redundant info', color:PURPLE});
    }
  }
  if (progress > 0.9) {
    if (CFG.name === 'SEMF') {
      activeCodes.push({code:'XC-RPS-DIS', text:'Stable: ln(Vol/Sym+Pair) CV=6.6%', color:CYAN});
    } else {
      activeCodes.push({code:'XU-MDS-CAL', text:'Match density calibration signal', color:BLUE});
    }
  }
  if (progress > 0.95) activeCodes.push({code:'RP-CMP-INF', text:'Pipeline complete ✓', color:GREEN});

  for (let i = 0; i < activeCodes.length && i < Math.floor((h-padT)/lineH); i++) {
    const c = activeCodes[i];
    const y = padT + i * lineH;
    const fadeProgress = Math.min(1, (progress * 14 - i) * 2);
    ctx.globalAlpha = Math.max(0.3, fadeProgress);

    ctx.fillStyle = DIM; ctx.font = '9px Consolas'; ctx.textAlign = 'left';
    ctx.fillText(`[${c.code}]`, padL, y);
    ctx.fillStyle = c.color; ctx.font = '10px Segoe UI';
    ctx.fillText(c.text, padL + 90, y);
    ctx.globalAlpha = 1;
  }

  // System summary at bottom
  ctx.fillStyle = GOLD; ctx.font = 'bold 11px Consolas'; ctx.textAlign = 'center';
  if (CFG.name === 'SEMF') {
    ctx.fillText(`Nuclear SEMF (Z=1→92) • ${CFG.matchConst} at δ=${CFG.matchDelta}`, w/2, h - 10);
  } else {
    ctx.fillText(`Radionuclides (N=39, D=4) • ${CFG.matchConst} at δ=${CFG.matchDelta}`, w/2, h - 10);
  }
}

// Start
window.addEventListener('load', init);
window.addEventListener('click', () => { running = !running; if (running) animate(); });
