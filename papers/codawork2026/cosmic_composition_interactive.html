// Lookback time approximation (simplified Planck 2018)
function lookbackGyr(z) {
  if (z <= 0) return 0;
  const H0 = 67.4, Om = 0.315, Ol = 0.685;
  // Simple numerical integration
  let sum = 0; const steps = 200; const dz = z / steps;
  for (let i = 0; i < steps; i++) {
    const zi = (i + 0.5) * dz;
    const E = Math.sqrt(Ol + Om * Math.pow(1 + zi, 3));
    sum += dz / ((1 + zi) * E);
  }
  return (sum * 977.8 / H0).toFixed(1); // Gyr
}

  seg.style.background = p.color;
  seg.style.color = '#999';
  seg.textContent = p.label;
  strip.appendChild(seg);
});
const marker = document.createElement('div');
marker.className = 'marker';
strip.appendChild(marker);

// Build bars
const barsArea = document.getElementById('barsArea');
CARRIERS.forEach((c, i) => {
  const col = document.createElement('div');
  col.className = 'bar-col';
  col.innerHTML = `
    <div class="bar-wrap"><div class="bar" id="bar${i}" style="background:${c.color}"></div></div>
    <div class="bar-label" style="color:${c.color}">${c.short}</div>
    <div class="bar-val" id="barVal${i}">—</div>
    <div class="bar-pct" id="barPct${i}"></div>
  `;
  barsArea.appendChild(col);
});

const slider = document.getElementById('slider');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
let playing = false, animFrame = null, lastTime = 0;

function update(idx) {
  const row = DATA[idx];
  const z = row[0];

  // Bars (log scale for visibility, but show actual %)
  const maxFrac = Math.max(...row.slice(1));
  for (let i = 0; i < 5; i++) {
    const frac = row[i + 1];
    // Use sqrt scale for better visibility of small components
    const h = Math.max(1, (Math.sqrt(frac) / Math.sqrt(maxFrac)) * 270);
    document.getElementById('bar' + i).style.height = h + 'px';
    const pct = frac * 100;
    document.getElementById('barVal' + i).textContent = pct >= 1 ? pct.toFixed(1) + '%' : pct.toExponential(1);
    document.getElementById('barPct' + i).textContent = CARRIERS[i].name;
  }

  // Phase marker
  marker.style.left = (idx / total * 100) + '%';

  // Stats
  document.getElementById('statZ').textContent = z < 10 ? z.toFixed(2) : z.toFixed(0);
  document.getElementById('statTime').textContent = lookbackGyr(z) + ' Gyr';

  let domIdx = 1; let domVal = 0;
  for (let i = 1; i <= 5; i++) { if (row[i] > domVal) { domVal = row[i]; domIdx = i - 1; } }
  const domEl = document.getElementById('statDom');
  domEl.textContent = CARRIERS[domIdx].name;
  domEl.style.color = CARRIERS[domIdx].color;

  const ratio = row[2] / row[3]; // CDM / Baryon
  document.getElementById('statRatio').textContent = ratio.toFixed(2);

  document.getElementById('epochLabel').textContent = `Epoch ${idx + 1} / ${total}`;
  slider.value = idx;

  // Annotation
  const ann = findAnnotation(idx);
  document.getElementById('annotation').innerHTML = ann ? ann.text : '';

  // Codes
  updateCodes(idx, z);
}

function updateCodes(idx, z) {
  const area = document.getElementById('codesArea');
  const codes = [];
  codes.push({ code: 'GD-ALL-INF', cls: 'code-inf' });
  codes.push({ code: 'S4-CLO-INF', cls: 'code-inf' });
  codes.push({ code: 'S5-CLR-INF', cls: 'code-inf' });
  codes.push({ code: 'S8-NAT-INF', cls: 'code-inf' });
  codes.push({ code: 'S7-BWL-INF', cls: 'code-inf' });

  if (z > 0.25 && z < 0.4) codes.push({ code: 'SM-RTR-DIS', cls: 'code-dis' });
  if (z > 900 && z < 1200) codes.push({ code: 'SM-RTR-DIS', cls: 'code-dis' });
  if (z > 3000) codes.push({ code: 'SM-RTR-DIS', cls: 'code-dis' });

  codes.push({ code: 'S8-EUL-DIS', cls: 'code-dis' });
  codes.push({ code: 'XC-RPS-DIS', cls: 'code-dis' });
  codes.push({ code: 'XU-DPC-DIS', cls: 'code-dis' });

  if (idx > 80) {
    codes.push({ code: 'XU-HRX-WRN', cls: 'code-wrn' });
  }

  area.innerHTML = codes.map(c => `<span class="code-tag ${c.cls}">${c.code}</span>`).join('');
}

function togglePlay() {
  playing = !playing;
  playIcon.style.display = playing ? 'none' : 'block';
  pauseIcon.style.display = playing ? 'block' : 'none';
  if (playing) {
    if (parseInt(slider.value) >= DATA.length - 1) slider.value = 0;
    lastTime = performance.now();
    animate();
  }
}

function animate() {
  if (!playing) return;
  const now = performance.now();
  if (now - lastTime > 120) {
    lastTime = now;
    let idx = parseInt(slider.value) + 1;
    if (idx >= DATA.length) {
      playing = false;
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      return;
    }
    update(idx);
  }
  animFrame = requestAnimationFrame(animate);
}

playBtn.addEventListener('click', togglePlay);
slider.addEventListener('input', () => { update(parseInt(slider.value)); });

// Initialize
update(0);
</script>
</body>
</html>
