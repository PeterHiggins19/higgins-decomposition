<svg viewBox="0 0 750 900" xmlns="http://www.w3.org/2000/svg">
  <title>CNT Complete Transform Pipeline — Full Math and Symbology</title>
  <desc>Expanded flowchart showing every mathematical operation from raw data through CLR to all four CNT output channels with complete formulae, dimensions, bounds, and units.</desc>

  <!-- Dark background -->
  <rect width="750" height="900" fill="#1a1a1a"/>

  <style>
    text { font-family: 'Arial', 'Helvetica', sans-serif; fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: 700; fill: #ffffff; }
    .subtitle { font-size: 10px; fill: #aaaaaa; }
    .label { font-size: 9.5px; fill: #d0d0d0; }
    .label-bold { font-size: 9.5px; font-weight: 700; fill: #e8e8e8; }
    .math { font-size: 9px; font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; fill: #d0d0d0; }
    .math-sm { font-size: 8px; font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; fill: #b8b8b8; }
    .channel-title { font-size: 11.5px; font-weight: 700; fill: #ffffff; }
    .dim { font-size: 8px; fill: #999999; }
    .bound { font-size: 8px; fill: #cccccc; font-family: 'Courier New', monospace; }
    .provenance { font-size: 8.5px; font-family: 'Courier New', monospace; letter-spacing: 0.5px; fill: #aaaaaa; }
    .arrow { fill: none; stroke: #888888; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .flow { fill: none; stroke: #cccccc; stroke-width: 2; marker-end: url(#arrowhead); }
    .branch { fill: none; stroke: #cccccc; stroke-width: 1.5; }
    .box { rx: 4; fill: #2a2a2a; stroke: #555555; stroke-width: 1.2; }
    .box-heavy { rx: 4; fill: #2a2a2a; stroke: #888888; stroke-width: 2; }
    .box-dashed { rx: 4; fill: #222222; stroke: #666666; stroke-width: 1; stroke-dasharray: 4,2; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- HEADER -->
  <text x="375" y="22" text-anchor="middle" class="title">CNT — Compositional Navigation Tensor: Complete Transform Pipeline</text>
  <text x="375" y="38" text-anchor="middle" class="provenance">Scale Provenance: Y_j(t) --> x_j = Y_j/T --> h_j = CLR(x) --> CNT(x) = (theta, omega, kappa_HS, sigma)</text>

  <!-- STAGE 1: RAW DATA -->
  <rect x="220" y="52" width="310" height="44" class="box"/>
  <text x="375" y="69" text-anchor="middle" class="channel-title">RAW DATA</text>
  <text x="375" y="82" text-anchor="middle" class="math">Y = { Y_j(t) }   j = 1..D,  t = 1..N</text>
  <text x="375" y="92" text-anchor="middle" class="dim">Absolute values (TWh, counts, mass, ...) -- D carriers x N time steps</text>

  <!-- Arrow -->
  <path d="M 375 96 L 375 116" class="flow"/>
  <text x="390" y="110" class="dim">closure</text>

  <!-- STAGE 2: CLOSURE -->
  <rect x="220" y="118" width="310" height="50" class="box"/>
  <text x="375" y="136" text-anchor="middle" class="channel-title">CLOSURE --> Composition x(t)</text>
  <text x="375" y="150" text-anchor="middle" class="math">x_j(t) = Y_j(t) / Sigma_k Y_k(t)</text>
  <text x="375" y="163" text-anchor="middle" class="dim">x in S^D (open simplex) -- Sigma x_j = 1 -- x_j > 0 -- dimensionless proportions</text>

  <!-- Arrow -->
  <path d="M 375 168 L 375 190" class="flow"/>
  <text x="390" y="183" class="dim">log-ratio</text>

  <!-- STAGE 3: CLR TRANSFORM -->
  <rect x="170" y="192" width="410" height="65" class="box-heavy"/>
  <text x="375" y="210" text-anchor="middle" class="channel-title">CLR TRANSFORM --> Higgins Coordinate h(t)</text>
  <text x="375" y="226" text-anchor="middle" class="math">h_j(t) = ln(x_j(t)) - (1/D) Sigma_k ln(x_k(t)) = ln( x_j / g(x) )</text>
  <text x="375" y="240" text-anchor="middle" class="dim">h in R^D,  Sigma h_j = 0 (sum-to-zero hyperplane) -- Unit: HLR (Higgins Log-Ratio Level)</text>
  <text x="375" y="252" text-anchor="middle" class="dim">g(x) = geometric mean = (Prod x_k)^(1/D) -- Barycentre maps to origin -- D-1 degrees of freedom</text>

  <!-- BRANCHING: 4 paths -->
  <path d="M 375 257 L 375 275" class="branch"/>
  <path d="M 375 275 L 95 275" class="branch"/>
  <path d="M 375 275 L 660 275" class="branch"/>
  <path d="M 95 275 L 95 295" class="flow"/>
  <path d="M 280 275 L 280 295" class="flow"/>
  <path d="M 470 275 L 470 295" class="flow"/>
  <path d="M 660 275 L 660 295" class="flow"/>

  <!-- CHANNEL 1: THETA -->
  <rect x="12" y="297" width="175" height="185" class="box"/>
  <text x="100" y="315" text-anchor="middle" class="channel-title">theta -- Bearing Tensor</text>

  <text x="22" y="335" class="label-bold">Definition:</text>
  <text x="22" y="350" class="math">theta_ij(x) = atan2( h_j, h_i )</text>

  <text x="22" y="370" class="label-bold">Tensor rank:</text>
  <text x="22" y="384" class="dim">Rank-2 antisymmetric: theta_ij = -theta_ji + pi</text>

  <text x="22" y="404" class="label-bold">Shape:</text>
  <text x="22" y="418" class="dim">D(D-1)/2 independent values</text>
  <text x="22" y="430" class="dim">D=8 --> 28 bearings</text>

  <text x="22" y="450" class="label-bold">Bounds:</text>
  <text x="22" y="464" class="bound">[-180 deg, +180 deg] exact (atan2)</text>

  <text x="22" y="480" class="label-bold">Requires:</text>
  <text x="22" y="492" class="dim">1 time point (instantaneous)</text>

  <!-- CHANNEL 2: OMEGA -->
  <rect x="197" y="297" width="175" height="185" class="box"/>
  <text x="285" y="315" text-anchor="middle" class="channel-title">omega -- Angular Velocity</text>

  <text x="207" y="335" class="label-bold">Definition:</text>
  <text x="207" y="350" class="math">omega = atan2(||h1 x h2||, &lt;h1,h2&gt;)</text>

  <text x="207" y="370" class="label-bold">Cross product (Lagrange):</text>
  <text x="207" y="384" class="math-sm">||h1 x h2||^2 = ||h1||^2 ||h2||^2 - &lt;h1,h2&gt;^2</text>

  <text x="207" y="404" class="label-bold">Tensor rank:</text>
  <text x="207" y="418" class="dim">Rank-0 scalar (1 value per step)</text>

  <text x="207" y="438" class="label-bold">Bounds:</text>
  <text x="207" y="452" class="bound">[0 deg, 180 deg] exact</text>

  <text x="207" y="470" class="label-bold">Requires:</text>
  <text x="207" y="484" class="dim">2 consecutive time points (incremental)</text>

  <!-- CHANNEL 3: KAPPA_HS -->
  <rect x="382" y="297" width="180" height="185" class="box"/>
  <text x="472" y="315" text-anchor="middle" class="channel-title">kappa_HS -- Steering Metric</text>

  <text x="392" y="335" class="label-bold">Definition:</text>
  <text x="392" y="350" class="math">kappa_ij = (delta_ij - 1/D) / (x_i x_j)</text>

  <text x="392" y="370" class="label-bold">Matrix form:</text>
  <text x="392" y="384" class="math-sm">kappa_HS = diag(1/x) P diag(1/x)</text>
  <text x="392" y="398" class="math-sm">P = I - (1/D) 11^T</text>

  <text x="392" y="418" class="label-bold">Tensor rank:</text>
  <text x="392" y="432" class="dim">Rank-2 symmetric (D x D)</text>
  <text x="392" y="444" class="dim">D=8 --> 36 independent entries</text>

  <text x="392" y="462" class="label-bold">Diagonal (sensitivity):</text>
  <text x="392" y="476" class="math-sm">kappa_jj = (1-1/D) / x_j^2</text>

  <!-- CHANNEL 4: SIGMA -->
  <rect x="572" y="297" width="165" height="185" class="box"/>
  <text x="655" y="315" text-anchor="middle" class="channel-title">sigma -- Helmsman (DCDI)</text>

  <text x="582" y="335" class="label-bold">Definition:</text>
  <text x="582" y="350" class="math">sigma = argmax_j |Delta h_j|</text>

  <text x="582" y="370" class="label-bold">Expansion:</text>
  <text x="582" y="384" class="math-sm">Delta h_j = h_j(t+1) - h_j(t)</text>
  <text x="582" y="398" class="math-sm">approx Delta x_j / x_j (relative change)</text>

  <text x="582" y="418" class="label-bold">Tensor rank:</text>
  <text x="582" y="432" class="dim">Rank-0 categorical index {1..D}</text>

  <text x="582" y="452" class="label-bold">Output:</text>
  <text x="582" y="466" class="dim">1 carrier label per step</text>

  <text x="582" y="480" class="label-bold">Requires:</text>
  <text x="582" y="492" class="dim">2 consecutive points (incremental)</text>

  <!-- Information flow arrow kappa -> sigma -->
  <path d="M 562 470 L 572 470" class="arrow" stroke-dasharray="3,2"/>
  <text x="540" y="466" text-anchor="middle" class="dim">predicts</text>

  <!-- COROLLARIES SECTION -->
  <rect x="12" y="502" width="725" height="76" class="box-dashed"/>
  <text x="375" y="518" text-anchor="middle" class="label-bold" style="font-size:10.5px;">Key Corollaries (proven invariants)</text>

  <text x="22" y="536" class="math-sm">C1 (Determinism): Same x --> same theta. No parameters, no fitting, no model selection.</text>
  <text x="22" y="550" class="math-sm">C2 (Steering Asymmetry): max(kappa_jj)/min(kappa_jj) = R^2 where R = max(x)/min(x). Rare carriers dominate steering.</text>
  <text x="22" y="564" class="math-sm">C3 (Lock Detection): max_t(theta_ij) - min_t(theta_ij) &lt; epsilon ==> carriers i,j move as single mode (constant ratio).</text>
  <text x="22" y="578" class="math-sm">C5 (Infinite Helm): x_j --> 0 ==> kappa_jj --> infinity ==> vanishing carrier has infinite steering authority.</text>

  <!-- OUTPUT SUMMARY -->
  <rect x="90" y="596" width="570" height="46" class="box-heavy"/>
  <text x="375" y="613" text-anchor="middle" class="label-bold" style="font-size:10.5px;">Total CNT Output (D=8, per time step)</text>
  <text x="375" y="628" text-anchor="middle" class="math">28 bearings + 1 scalar + 36 metric entries + 1 index = 66 independent measurements</text>
  <text x="375" y="640" text-anchor="middle" class="dim">from 8 proportions at 2 time points (16 numbers input) -- dimensionality EXPANDER</text>

  <!-- PROPERTIES -->
  <text x="375" y="670" text-anchor="middle" class="label-bold" style="font-size:10px;">Mathematical Properties (all channels)</text>

  <text x="90" y="690" text-anchor="middle" class="dim">DETERMINISTIC</text>
  <text x="230" y="690" text-anchor="middle" class="dim">CLOSED-FORM</text>
  <text x="375" y="690" text-anchor="middle" class="dim">PARAMETER-FREE</text>
  <text x="520" y="690" text-anchor="middle" class="dim">SCALE-INVARIANT</text>
  <text x="660" y="690" text-anchor="middle" class="dim">DOMAIN-AGNOSTIC</text>

  <!-- CBS DISPLAY STANDARD -->
  <line x1="12" y1="706" x2="738" y2="706" stroke="#444444" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="375" y="726" text-anchor="middle" class="title">CBS Display Standard -- Oscilloscope Instrument Channels</text>

  <rect x="12" y="738" width="235" height="62" class="box"/>
  <text x="130" y="755" text-anchor="middle" class="label-bold">XZ Face -- Bearings</text>
  <text x="130" y="769" text-anchor="middle" class="dim">All D(D-1)/2 theta_ij as bar chart</text>
  <text x="130" y="783" text-anchor="middle" class="bound">Y: [-180 deg, +180 deg] FIXED</text>
  <text x="130" y="797" text-anchor="middle" class="dim">Directional state snapshot</text>

  <rect x="257" y="738" width="235" height="62" class="box"/>
  <text x="375" y="755" text-anchor="middle" class="label-bold">XY Face -- CLR Scatter</text>
  <text x="375" y="769" text-anchor="middle" class="dim">h_i vs h_j plan view</text>
  <text x="375" y="783" text-anchor="middle" class="bound">X,Y: [CLR_min, CLR_max] FIXED</text>
  <text x="375" y="797" text-anchor="middle" class="dim">Displacement from barycentre</text>

  <rect x="502" y="738" width="235" height="62" class="box"/>
  <text x="620" y="755" text-anchor="middle" class="label-bold">YZ Face -- CLR Bars</text>
  <text x="620" y="769" text-anchor="middle" class="dim">h_j per carrier (D bars)</text>
  <text x="620" y="783" text-anchor="middle" class="bound">Y: [CLR_min, CLR_max] FIXED</text>
  <text x="620" y="797" text-anchor="middle" class="dim">Profile of all carriers in HLR</text>

  <!-- Info panel -->
  <rect x="50" y="816" width="650" height="56" class="box-dashed"/>
  <text x="375" y="833" text-anchor="middle" class="label-bold">Info Panel (per plate)</text>
  <text x="60" y="848" class="dim">Hs (Higgins Scale) | Ring | omega (angular velocity) | sigma (Helmsman) | d_A (Aitchison distance)</text>
  <text x="60" y="860" class="dim">kappa_HS (condition) | E_metric (energy) | DR (dynamic range in HLR + ratio) | Scale provenance chain</text>
  <text x="60" y="872" class="dim">Legend: all D(D-1)/2 pair indices with carrier names | Unit: HLR | FIXED SCALE identifier</text>

  <!-- Footer -->
  <text x="375" y="895" text-anchor="middle" class="subtitle">The instrument reads. The expert decides. The loop stays open.</text>
</svg>