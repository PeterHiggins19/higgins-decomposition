<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <title>CBS Cube -- 3D Structure with Face Labels</title>
  <rect width="1000" height="560" fill="#1a1a1a"/>
  <style>
    text { font-family: 'Arial', 'Helvetica', sans-serif; fill: #e0e0e0; }
    .title { font-size: 28px; font-weight: 700; fill: #ffffff; }
    .label { font-size: 18px; fill: #cccccc; }
    .label-bold { font-size: 20px; font-weight: 700; fill: #ffffff; }
    .dim { font-size: 16px; fill: #999999; }
    .axis-label { font-size: 22px; font-weight: 700; fill: #ffffff; }
    .face-title { font-size: 18px; font-weight: 700; fill: #ffffff; }
  </style>
  <defs>
    <marker id="ax" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" class="title">CBS Cube -- Three Orthogonal Face Projections</text>

  <!-- THE 3D CUBE (isometric, enlarged) -->
  <!-- XY face (front-left) -->
  <path d="M 250 200 L 250 400 L 470 500 L 470 300 Z" fill="#252525" stroke="#777777" stroke-width="2.5"/>
  <!-- Scatter dots on XY -->
  <circle cx="320" cy="320" r="4" fill="#cccccc"/>
  <circle cx="350" cy="360" r="4" fill="#cccccc"/>
  <circle cx="380" cy="330" r="4" fill="#cccccc"/>
  <circle cx="340" cy="390" r="4" fill="#cccccc"/>
  <circle cx="400" cy="370" r="4" fill="#cccccc"/>
  <circle cx="310" cy="380" r="4" fill="#cccccc"/>
  <circle cx="420" cy="350" r="4" fill="#cccccc"/>
  <!-- Origin cross -->
  <line x1="355" y1="355" x2="375" y2="355" stroke="#ffffff" stroke-width="2"/>
  <line x1="365" y1="345" x2="365" y2="365" stroke="#ffffff" stroke-width="2"/>
  <text x="360" y="440" text-anchor="middle" class="face-title">XY FACE</text>
  <text x="360" y="462" text-anchor="middle" class="dim">CLR scatter (plan)</text>

  <!-- XZ face (top) -->
  <path d="M 250 200 L 470 300 L 650 220 L 430 120 Z" fill="#2a2a2a" stroke="#777777" stroke-width="2.5"/>
  <!-- Bearing bars on top -->
  <line x1="310" y1="218" x2="310" y2="195" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="345" y1="230" x2="345" y2="250" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="380" y1="235" x2="380" y2="215" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="420" y1="242" x2="420" y2="225" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="470" y1="260" x2="470" y2="278" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="510" y1="250" x2="510" y2="235" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="550" y1="242" x2="550" y2="258" stroke="#cccccc" stroke-width="3.5"/>
  <text x="450" y="190" text-anchor="middle" class="face-title">XZ FACE</text>
  <text x="450" y="210" text-anchor="middle" class="dim">Bearings (D(D-1)/2 bars)</text>

  <!-- YZ face (right) -->
  <path d="M 470 300 L 470 500 L 650 420 L 650 220 Z" fill="#2e2e2e" stroke="#777777" stroke-width="2.5"/>
  <!-- CLR bars on right -->
  <line x1="500" y1="300" x2="540" y2="300" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="500" y1="325" x2="570" y2="325" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="500" y1="350" x2="515" y2="350" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="500" y1="375" x2="590" y2="375" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="500" y1="400" x2="555" y2="400" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="500" y1="425" x2="510" y2="425" stroke="#cccccc" stroke-width="3.5"/>
  <line x1="500" y1="450" x2="560" y2="450" stroke="#cccccc" stroke-width="3.5"/>
  <text x="560" y="365" text-anchor="middle" class="face-title">YZ FACE</text>
  <text x="560" y="387" text-anchor="middle" class="dim">CLR bars (D bars)</text>

  <!-- Hidden edges (dashed) -->
  <path d="M 250 400 L 430 320" stroke="#555555" stroke-width="1.2" stroke-dasharray="5,4" fill="none"/>
  <path d="M 430 120 L 430 320" stroke="#555555" stroke-width="1.2" stroke-dasharray="5,4" fill="none"/>
  <path d="M 650 420 L 430 320" stroke="#555555" stroke-width="1.2" stroke-dasharray="5,4" fill="none"/>

  <!-- AXES -->
  <line x1="250" y1="400" x2="160" y2="450" stroke="#cccccc" stroke-width="2.5" marker-end="url(#ax)"/>
  <text x="130" y="465" class="axis-label">h_i</text>

  <line x1="470" y1="500" x2="540" y2="540" stroke="#cccccc" stroke-width="2.5" marker-end="url(#ax)"/>
  <text x="550" y="550" class="axis-label">h_j</text>

  <line x1="250" y1="200" x2="250" y2="100" stroke="#cccccc" stroke-width="2.5" marker-end="url(#ax)"/>
  <text x="225" y="90" class="axis-label">theta</text>

  <!-- Legend on right -->
  <text x="730" y="100" class="label-bold">CBS = Compositional Bearing Scope</text>
  <text x="730" y="130" class="label">3 faces = 3 simultaneous views</text>
  <text x="730" y="160" class="label">All scales FIXED across time</text>
  <text x="730" y="200" class="label-bold">Unit: HLR</text>
  <text x="730" y="230" class="label">Origin = geometric mean</text>
  <text x="730" y="260" class="label">(barycentre of the simplex)</text>

  <text x="730" y="320" class="label-bold">Axes:</text>
  <text x="730" y="350" class="label">h_i, h_j = CLR coordinates</text>
  <text x="730" y="380" class="label">theta = bearing angle</text>

  <!-- Footer -->
  <text x="500" y="550" text-anchor="middle" class="dim">The instrument reads. The expert decides. The loop stays open.</text>
</svg>
