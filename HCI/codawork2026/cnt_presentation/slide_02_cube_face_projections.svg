<svg viewBox="0 0 750 680" xmlns="http://www.w3.org/2000/svg">
  <title>CBS Cube Face Projections Along the Higgins Axis</title>
  <desc>3D isometric cube showing XY, XZ, and YZ face projections with time axis (Higgins axis) showing section plates emanating as a cine-deck sequence.</desc>

  <!-- Dark background -->
  <rect width="750" height="680" fill="#1a1a1a"/>

  <style>
    text { font-family: 'Arial', 'Helvetica', sans-serif; fill: #e0e0e0; }
    .title { font-size: 14px; font-weight: 700; fill: #ffffff; }
    .subtitle { font-size: 10px; fill: #aaaaaa; }
    .label { font-size: 9.5px; fill: #d0d0d0; }
    .label-bold { font-size: 10px; font-weight: 700; fill: #e8e8e8; }
    .math { font-size: 9px; font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; fill: #d0d0d0; }
    .dim { font-size: 8px; fill: #999999; }
    .axis-label { font-size: 11px; font-weight: 700; fill: #ffffff; }
    .face-title { font-size: 10px; font-weight: 700; fill: #ffffff; }
    .bound { font-size: 8px; font-family: 'Courier New', monospace; fill: #cccccc; }
  </style>

  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cccccc"/>
    </marker>
    <marker id="taxr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- HEADER -->
  <text x="375" y="22" text-anchor="middle" class="title">CBS Cube -- Three Orthogonal Face Projections Along the Higgins Axis</text>
  <text x="375" y="38" text-anchor="middle" class="subtitle">Each section plate is one time-slice of the cube. Scrolling along t reveals compositional motion against fixed scales.</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- THE 3D CUBE (isometric projection)         -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- XY face (bottom/front) - plan view -->
  <path d="M 180 280 L 180 420 L 330 495 L 330 355 Z" fill="#252525" stroke="#777777" stroke-width="1.8"/>
  <!-- Hatch pattern for XY -->
  <line x1="195" y1="305" x2="195" y2="435" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="215" y1="315" x2="215" y2="445" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="235" y1="325" x2="235" y2="455" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="255" y1="335" x2="255" y2="465" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="275" y1="345" x2="275" y2="475" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="295" y1="355" x2="295" y2="485" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="315" y1="365" x2="315" y2="493" stroke="#444444" stroke-width="0.4" stroke-dasharray="2,4"/>
  <!-- XY face label -->
  <text x="255" y="400" text-anchor="middle" class="face-title">XY FACE</text>
  <text x="255" y="414" text-anchor="middle" class="dim">CLR scatter (plan view)</text>
  <text x="255" y="426" text-anchor="middle" class="dim">h_i vs h_j</text>

  <!-- XZ face (top) - bearings -->
  <path d="M 180 280 L 330 355 L 460 295 L 310 220 Z" fill="#2a2a2a" stroke="#777777" stroke-width="1.8"/>
  <!-- XZ face label -->
  <text x="320" y="278" text-anchor="middle" class="face-title">XZ FACE</text>
  <text x="320" y="292" text-anchor="middle" class="dim">Bearings bar chart</text>
  <text x="320" y="304" text-anchor="middle" class="dim">all D(D-1)/2 pairs</text>

  <!-- YZ face (right side) - CLR bars -->
  <path d="M 330 355 L 330 495 L 460 435 L 460 295 Z" fill="#2e2e2e" stroke="#777777" stroke-width="1.8"/>
  <!-- YZ face label -->
  <text x="395" y="390" text-anchor="middle" class="face-title">YZ FACE</text>
  <text x="395" y="404" text-anchor="middle" class="dim">CLR bars</text>
  <text x="395" y="416" text-anchor="middle" class="dim">per carrier (D bars)</text>

  <!-- Hidden edges (dashed) -->
  <path d="M 180 420 L 310 360" stroke="#555555" stroke-width="0.8" stroke-dasharray="4,3" fill="none"/>
  <path d="M 310 220 L 310 360" stroke="#555555" stroke-width="0.8" stroke-dasharray="4,3" fill="none"/>
  <path d="M 460 435 L 310 360" stroke="#555555" stroke-width="0.8" stroke-dasharray="4,3" fill="none"/>

  <!-- TYPICAL IMAGERY on faces -->
  <!-- Scatter dots on XY face -->
  <circle cx="225" cy="365" r="2.5" fill="#cccccc"/>
  <circle cx="240" cy="380" r="2.5" fill="#cccccc"/>
  <circle cx="260" cy="358" r="2.5" fill="#cccccc"/>
  <circle cx="250" cy="395" r="2.5" fill="#cccccc"/>
  <circle cx="280" cy="375" r="2.5" fill="#cccccc"/>
  <circle cx="235" cy="405" r="2.5" fill="#cccccc"/>
  <circle cx="270" cy="415" r="2.5" fill="#cccccc"/>
  <circle cx="305" cy="388" r="2" fill="#cccccc"/>
  <!-- Origin cross on XY -->
  <line x1="252" y1="385" x2="264" y2="385" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="258" y1="379" x2="258" y2="391" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Bearing bars on XZ face (top) -->
  <line x1="225" y1="292" x2="225" y2="278" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="245" y1="298" x2="245" y2="312" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="265" y1="295" x2="265" y2="280" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="285" y1="300" x2="285" y2="287" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="320" y1="310" x2="320" y2="323" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="340" y1="312" x2="340" y2="300" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="316" x2="360" y2="328" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="380" y1="308" x2="380" y2="296" stroke="#cccccc" stroke-width="2.5"/>

  <!-- CLR bars on YZ face (right) -->
  <line x1="360" y1="325" x2="380" y2="325" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="342" x2="395" y2="342" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="359" x2="368" y2="359" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="376" x2="415" y2="376" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="393" x2="388" y2="393" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="410" x2="365" y2="410" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="427" x2="400" y2="427" stroke="#cccccc" stroke-width="2.5"/>
  <line x1="360" y1="435" x2="378" y2="435" stroke="#cccccc" stroke-width="2.5"/>

  <!-- AXES from front-bottom corner -->
  <!-- h_i axis -->
  <line x1="180" y1="420" x2="115" y2="458" stroke="#cccccc" stroke-width="1.8" marker-end="url(#ax)"/>
  <text x="95" y="468" class="axis-label">h_i</text>

  <!-- h_j axis -->
  <line x1="330" y1="495" x2="380" y2="522" stroke="#cccccc" stroke-width="1.8" marker-end="url(#ax)"/>
  <text x="385" y="535" class="axis-label">h_j</text>

  <!-- theta axis (vertical) -->
  <line x1="180" y1="280" x2="180" y2="200" stroke="#cccccc" stroke-width="1.8" marker-end="url(#ax)"/>
  <text x="165" y="195" class="axis-label">theta</text>

  <!-- Barycentre label -->
  <text x="180" y="440" text-anchor="middle" class="dim">Barycentre (origin)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TIME AXIS (Higgins Axis)                    -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Time arrow -->
  <line x1="460" y1="365" x2="720" y2="365" stroke="#cccccc" stroke-width="2.5" marker-end="url(#taxr)"/>
  <text x="730" y="369" class="axis-label">t</text>
  <text x="590" y="354" text-anchor="middle" class="label-bold">HIGGINS AXIS (time)</text>

  <!-- Section plate slices along time axis -->
  <!-- Plate t=0 -->
  <rect x="488" y="328" width="32" height="58" fill="#2a2a2a" stroke="#777777" stroke-width="1.2"/>
  <text x="504" y="398" text-anchor="middle" class="dim">t=0</text>
  <line x1="493" y1="342" x2="515" y2="342" stroke="#999999" stroke-width="0.8"/>
  <line x1="493" y1="352" x2="515" y2="352" stroke="#999999" stroke-width="0.8"/>
  <line x1="493" y1="362" x2="515" y2="362" stroke="#999999" stroke-width="0.8"/>
  <circle cx="500" cy="372" r="1.5" fill="#cccccc"/>
  <circle cx="508" cy="377" r="1.5" fill="#cccccc"/>

  <!-- Plate t=1 -->
  <rect x="530" y="328" width="32" height="58" fill="#2a2a2a" stroke="#777777" stroke-width="1.2"/>
  <text x="546" y="398" text-anchor="middle" class="dim">t=1</text>
  <line x1="535" y1="342" x2="557" y2="342" stroke="#999999" stroke-width="0.8"/>
  <line x1="535" y1="352" x2="557" y2="352" stroke="#999999" stroke-width="0.8"/>
  <line x1="535" y1="362" x2="557" y2="362" stroke="#999999" stroke-width="0.8"/>
  <circle cx="542" cy="374" r="1.5" fill="#cccccc"/>
  <circle cx="551" cy="370" r="1.5" fill="#cccccc"/>

  <!-- Plate t=2 -->
  <rect x="572" y="328" width="32" height="58" fill="#2a2a2a" stroke="#777777" stroke-width="1.2"/>
  <text x="588" y="398" text-anchor="middle" class="dim">t=2</text>
  <line x1="577" y1="342" x2="599" y2="342" stroke="#999999" stroke-width="0.8"/>
  <line x1="577" y1="352" x2="599" y2="352" stroke="#999999" stroke-width="0.8"/>
  <line x1="577" y1="362" x2="599" y2="362" stroke="#999999" stroke-width="0.8"/>
  <circle cx="585" cy="376" r="1.5" fill="#cccccc"/>
  <circle cx="593" cy="371" r="1.5" fill="#cccccc"/>

  <!-- Dots -->
  <text x="618" y="365" class="label-bold">...</text>

  <!-- Plate t=N -->
  <rect x="645" y="328" width="32" height="58" fill="#2a2a2a" stroke="#777777" stroke-width="1.2"/>
  <text x="661" y="398" text-anchor="middle" class="dim">t=N</text>
  <line x1="650" y1="342" x2="672" y2="342" stroke="#999999" stroke-width="0.8"/>
  <line x1="650" y1="352" x2="672" y2="352" stroke="#999999" stroke-width="0.8"/>
  <line x1="650" y1="362" x2="672" y2="362" stroke="#999999" stroke-width="0.8"/>
  <circle cx="658" cy="375" r="1.5" fill="#cccccc"/>
  <circle cx="666" cy="369" r="1.5" fill="#cccccc"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FACE ANNOTATIONS                            -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="15" y="510" width="230" height="72" fill="#2a2a2a" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="130" y="526" text-anchor="middle" class="label-bold">XY Face -- Plan View</text>
  <text x="25" y="541" class="math">h_i(t) vs h_j(t) for all carriers</text>
  <text x="25" y="555" class="dim">Shows: CLR displacement from barycentre</text>
  <text x="25" y="567" class="bound">Scale: [CLR_min, CLR_max] FIXED both axes</text>
  <text x="25" y="579" class="dim">Unit: HLR -- Origin = geometric mean</text>

  <rect x="260" y="510" width="230" height="72" fill="#2a2a2a" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="375" y="526" text-anchor="middle" class="label-bold">XZ Face -- Bearing View</text>
  <text x="270" y="541" class="math">theta_ij for all D(D-1)/2 pairs</text>
  <text x="270" y="555" class="dim">Shows: directional state (pairwise angles)</text>
  <text x="270" y="567" class="bound">Scale: [-180 deg, +180 deg] FIXED exact</text>
  <text x="270" y="579" class="dim">Each bar = one carrier pair bearing</text>

  <rect x="505" y="510" width="230" height="72" fill="#2a2a2a" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="620" y="526" text-anchor="middle" class="label-bold">YZ Face -- Profile View</text>
  <text x="515" y="541" class="math">h_j(t) per carrier (D bars)</text>
  <text x="515" y="555" class="dim">Shows: each carrier CLR level</text>
  <text x="515" y="567" class="bound">Scale: [CLR_min, CLR_max] FIXED</text>
  <text x="515" y="579" class="dim">Positive = above mean, negative = below</text>

  <!-- CINE-DECK explanation -->
  <rect x="40" y="600" width="670" height="55" fill="#222222" stroke="#777777" stroke-width="1.5" rx="4"/>
  <text x="375" y="618" text-anchor="middle" class="label-bold">Section Cine-Deck -- Projection in Time Along the Higgins Axis</text>
  <text x="55" y="634" class="dim">Each section plate = one time-slice of the cube with all 3 faces frozen. Fixed-scale graticule locked across all plates.</text>
  <text x="55" y="648" class="dim">Scrolling the cine-deck (t_0 --> t_N) = sweeping along the Higgins axis. ONLY genuine compositional motion is visible.</text>

  <!-- Footer -->
  <text x="375" y="675" text-anchor="middle" class="subtitle">The instrument reads. The expert decides. The loop stays open.</text>
</svg>