<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <title>CBS Cube -- Higgins Axis Time Projection (Cine-Deck)</title>
  <rect width="1000" height="560" fill="#1a1a1a"/>
  <style>
    text { font-family: 'Arial', 'Helvetica', sans-serif; fill: #e0e0e0; }
    .title { font-size: 28px; font-weight: 700; fill: #ffffff; }
    .label { font-size: 18px; fill: #cccccc; }
    .label-bold { font-size: 20px; font-weight: 700; fill: #ffffff; }
    .dim { font-size: 16px; fill: #999999; }
    .axis-label { font-size: 22px; font-weight: 700; fill: #ffffff; }
    .box { rx: 6; fill: #2a2a2a; stroke: #555555; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="taxr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" class="title">Higgins Axis -- Section Plates Projected in Time</text>

  <!-- Small cube on left representing the CBS cube -->
  <path d="M 60 180 L 60 320 L 180 380 L 180 240 Z" fill="#252525" stroke="#777777" stroke-width="2"/>
  <path d="M 60 180 L 180 240 L 280 190 L 160 130 Z" fill="#2a2a2a" stroke="#777777" stroke-width="2"/>
  <path d="M 180 240 L 180 380 L 280 330 L 280 190 Z" fill="#2e2e2e" stroke="#777777" stroke-width="2"/>
  <text x="160" y="420" text-anchor="middle" class="label-bold">CBS Cube</text>
  <text x="160" y="445" text-anchor="middle" class="dim">(one time-slice)</text>

  <!-- TIME ARROW -->
  <line x1="300" y1="280" x2="930" y2="280" stroke="#cccccc" stroke-width="3" marker-end="url(#taxr)"/>
  <text x="950" y="285" class="axis-label">t</text>
  <text x="615" y="260" text-anchor="middle" class="label-bold">HIGGINS AXIS (time)</text>

  <!-- Section plates -->
  <!-- t=0 -->
  <rect x="350" y="230" width="60" height="90" fill="#2a2a2a" stroke="#777777" stroke-width="2"/>
  <text x="380" y="340" text-anchor="middle" class="label">t=0</text>
  <line x1="358" y1="248" x2="402" y2="248" stroke="#999999" stroke-width="1.2"/>
  <line x1="358" y1="263" x2="402" y2="263" stroke="#999999" stroke-width="1.2"/>
  <line x1="358" y1="278" x2="402" y2="278" stroke="#999999" stroke-width="1.2"/>
  <circle cx="370" cy="295" r="3" fill="#cccccc"/>
  <circle cx="388" cy="302" r="3" fill="#cccccc"/>

  <!-- t=1 -->
  <rect x="440" y="230" width="60" height="90" fill="#2a2a2a" stroke="#777777" stroke-width="2"/>
  <text x="470" y="340" text-anchor="middle" class="label">t=1</text>
  <line x1="448" y1="248" x2="492" y2="248" stroke="#999999" stroke-width="1.2"/>
  <line x1="448" y1="263" x2="492" y2="263" stroke="#999999" stroke-width="1.2"/>
  <line x1="448" y1="278" x2="492" y2="278" stroke="#999999" stroke-width="1.2"/>
  <circle cx="462" cy="297" r="3" fill="#cccccc"/>
  <circle cx="480" cy="293" r="3" fill="#cccccc"/>

  <!-- t=2 -->
  <rect x="530" y="230" width="60" height="90" fill="#2a2a2a" stroke="#777777" stroke-width="2"/>
  <text x="560" y="340" text-anchor="middle" class="label">t=2</text>
  <line x1="538" y1="248" x2="582" y2="248" stroke="#999999" stroke-width="1.2"/>
  <line x1="538" y1="263" x2="582" y2="263" stroke="#999999" stroke-width="1.2"/>
  <line x1="538" y1="278" x2="582" y2="278" stroke="#999999" stroke-width="1.2"/>
  <circle cx="552" cy="299" r="3" fill="#cccccc"/>
  <circle cx="570" cy="294" r="3" fill="#cccccc"/>

  <!-- dots -->
  <text x="630" y="280" class="label-bold">. . .</text>

  <!-- t=N -->
  <rect x="680" y="230" width="60" height="90" fill="#2a2a2a" stroke="#777777" stroke-width="2"/>
  <text x="710" y="340" text-anchor="middle" class="label">t=N</text>
  <line x1="688" y1="248" x2="732" y2="248" stroke="#999999" stroke-width="1.2"/>
  <line x1="688" y1="263" x2="732" y2="263" stroke="#999999" stroke-width="1.2"/>
  <line x1="688" y1="278" x2="732" y2="278" stroke="#999999" stroke-width="1.2"/>
  <circle cx="700" cy="298" r="3" fill="#cccccc"/>
  <circle cx="720" cy="292" r="3" fill="#cccccc"/>

  <!-- Explanation box -->
  <rect x="60" y="460" width="880" height="70" class="box"/>
  <text x="500" y="488" text-anchor="middle" class="label-bold">Section Cine-Deck -- Each plate = one frozen time-slice with all 3 faces</text>
  <text x="500" y="515" text-anchor="middle" class="label">Fixed-scale graticule locked across all plates. ONLY genuine compositional motion visible.</text>

  <!-- Footer -->
  <text x="500" y="555" text-anchor="middle" class="dim">The instrument reads. The expert decides. The loop stays open.</text>
</svg>
